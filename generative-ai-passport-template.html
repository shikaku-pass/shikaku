<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>生成AIパスポート無料問題集・試験対策 | 資格Pass</title>
<meta name="description" content="生成AIパスポートの学習サイト用テンプレート。問題データ差し替え式で、カテゴリ別演習・弱点復習・解説表示・スマホ対応を実装。公式シラバス準拠の構成に合わせて編集しやすいHTMLです。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2744;--green:#1D9E75;--green-d:#0F6E56;--green-bg:#E1F5EE;
  --accent:#F57F17;--accent-bg:#FFF8E1;--gold:#D4941A;--gold-bg:#FEF6E4;
  --bg:#f5f4f0;--bg2:#fff;--border:#e5e3dc;--border2:#c8c5bc;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --font-d:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
  --font-b:'Noto Sans JP',sans-serif;
  --radius:14px;--radius-sm:10px;--tap:52px;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:var(--font-b);min-height:100vh;color:var(--text);}
a{text-decoration:none;color:inherit;}
.site-header{background:var(--navy);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.site-logo{color:#fff;font-size:17px;font-weight:700;}
.site-logo span{color:#1D9E75;}
.site-back{color:rgba(255,255,255,0.7);font-size:13px;display:flex;align-items:center;gap:5px;transition:color .2s;}
.site-back:hover{color:#fff;}
.home-inner{max-width:480px;margin:0 auto;padding:20px 16px 60px;}
.home-hero{background:var(--navy);border-radius:var(--radius);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.hero-left{flex:1;min-width:0;}
.hero-exam-type{font-size:10px;color:#1D9E75;font-weight:700;letter-spacing:2.5px;margin-bottom:4px;}
.hero-exam-name{font-family:var(--font-d);font-size:22px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:10px;}
.hero-stats{display:flex;align-items:center;}
.hero-stat{display:flex;flex-direction:column;align-items:center;padding:0 14px 0 0;}
.hs-num{font-family:var(--font-d);font-size:18px;font-weight:900;color:#fff;}
.hs-lbl{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.hero-stat-div{width:1px;height:28px;background:rgba(255,255,255,0.15);margin-right:14px;}
.hero-rank{display:flex;flex-direction:column;align-items:center;gap:4px;border:1.5px solid;border-radius:12px;padding:10px 14px;flex-shrink:0;min-width:60px;}
.rank-k{font-family:var(--font-d);font-size:26px;font-weight:900;line-height:1;}
.rank-l{font-size:10px;font-weight:700;letter-spacing:1px;}
.rank-bar{width:100%;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;margin-top:4px;}
.rank-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.card-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.mode-row{display:flex;gap:8px;}
.mode-btn{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;font-family:var(--font-b);display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);transition:all .18s;min-height:70px;}
.mode-btn:hover:not(.mode-off){background:#f0efe8;border-color:var(--border2);}
.mode-active{background:var(--accent-bg)!important;border-color:var(--accent)!important;color:var(--accent)!important;}
.mode-off{opacity:.4;cursor:not-allowed;}
.mode-icon{font-size:18px;line-height:1;}
.mode-label{font-size:12px;font-weight:700;}
.mode-count{font-size:10px;color:var(--text3);}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;}
.cat-row.hidden{display:none;}
.cat-chip{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font-b);transition:all .18s;}
.cat-chip.active{border-color:var(--navy)!important;color:#fff!important;background:var(--navy)!important;font-weight:700!important;}
.opts-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.opt-group{display:flex;align-items:center;gap:5px;}
.opt-label{font-size:12px;color:var(--text3);margin-right:2px;}
.opt-pill{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font-b);transition:all .18s;}
.opt-pill.on{background:#EBF4FB!important;border-color:#85B7EB!important;color:#0C447C!important;}
.opt-shuffle.on{background:var(--green-bg)!important;border-color:var(--green)!important;color:var(--green-d)!important;}
.start-btn{width:100%;height:56px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:18px;font-weight:900;font-family:var(--font-d);letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 4px 16px rgba(245,127,23,.3);margin-bottom:8px;}
.start-btn:hover{background:#E65100;transform:translateY(-1px);}
.start-btn.off{opacity:.35;cursor:not-allowed;transform:none!important;}
.text-link{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--font-b);text-decoration:underline;width:100%;text-align:center;padding:6px;display:block;}
.quiz-inner{max-width:480px;margin:0 auto;padding:16px 16px 80px;display:flex;flex-direction:column;gap:12px;}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;}
.nav-back{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:var(--shadow);}
.nav-back:hover{border-color:var(--border2);}
.quiz-counter{display:flex;align-items:baseline;gap:3px;}
.qc-cur{font-family:var(--font-d);font-size:26px;font-weight:900;}
.qc-sep{font-size:13px;color:var(--text3);}
.qc-tot{font-size:15px;color:var(--text3);}
.star-btn{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid var(--border);font-size:20px;cursor:pointer;color:var(--text3);transition:all .2s;line-height:1;box-shadow:var(--shadow);}
.star-btn.on{color:var(--gold);border-color:var(--gold);background:var(--gold-bg);}
.q-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.q-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
.timer-wrap{position:relative;width:48px;height:48px;align-self:center;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;font-weight:900;}
.session-bar{display:flex;align-items:center;gap:8px;}
.sb-ok{font-size:12px;font-weight:700;color:var(--green);min-width:32px;}
.sb-ng{font-size:12px;font-weight:700;color:var(--accent);min-width:32px;text-align:right;}
.sb-dots{flex:1;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.sb-dot{width:8px;height:8px;border-radius:50%;}
.sd-ok{background:var(--green);}
.sd-ng{background:var(--accent);}
.sd-cur{background:var(--gold);width:10px;height:10px;}
.sd-future{background:var(--border);}
.sb-more{font-size:10px;color:var(--text3);}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.q-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.q-cat-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;}
.q-miss{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-bg);border:1px solid rgba(245,127,23,.3);padding:4px 10px;border-radius:7px;}
.q-text{font-size:16px;line-height:1.85;font-weight:500;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:0 14px;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;gap:12px;text-align:left;transition:all .15s;color:var(--text2);min-height:var(--tap);width:100%;box-shadow:var(--shadow);}
.choice:not(.ch-ok):not(.ch-ng):not(.ch-fade):hover{border-color:var(--accent);background:#FEF6F3;transform:translateX(3px);}
.ch-ok{background:#F0FBF6!important;border-color:var(--green)!important;color:var(--green-d)!important;}
.ch-ng{background:var(--accent-bg)!important;border-color:var(--accent)!important;color:#8B2A0E!important;}
.ch-fade{opacity:.3;}
.ch-alpha{font-family:var(--font-d);font-weight:900;font-size:13px;width:28px;height:28px;border-radius:7px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.ch-ok .ch-alpha{background:var(--green);color:#fff;border-color:var(--green);}
.ch-ng .ch-alpha{background:var(--accent);color:#fff;border-color:var(--accent);}
.ch-body{flex:1;font-size:14px;line-height:1.6;padding:13px 0;}
.ch-icon{font-size:17px;font-weight:700;}
.ch-ok .ch-icon{color:var(--green);}
.ch-ng .ch-icon{color:var(--accent);}
.exp-card{border-radius:12px;padding:16px;border:1px solid;}
.exp-ok{background:#F0FBF6;border-color:rgba(29,158,117,.3);}
.exp-ng{background:var(--accent-bg);border-color:rgba(245,127,23,.25);}
.exp-time{background:var(--gold-bg);border-color:rgba(212,148,26,.3);}
.exp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.exp-verdict{font-size:14px;font-weight:700;}
.exp-ok .exp-verdict{color:var(--green-d);}
.exp-ng .exp-verdict{color:var(--accent);}
.exp-time .exp-verdict{color:var(--gold);}
.exp-ans{font-size:12px;color:var(--gold);}
.exp-body{font-size:13px;line-height:1.9;color:var(--text2);}
.next-wrap{position:sticky;bottom:16px;padding-top:8px;background:linear-gradient(to top,var(--bg) 65%,transparent);}
.next-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);width:100%;height:var(--tap);font-size:17px;font-weight:700;font-family:var(--font-d);letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 4px 16px rgba(245,127,23,.3);}
.next-btn:hover{background:#E65100;transform:translateY(-1px);}
.result-inner{max-width:480px;margin:0 auto;padding:24px 16px 80px;display:flex;flex-direction:column;gap:16px;}
.result-hero{background:var(--navy);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.result-eyebrow{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.5);text-transform:uppercase;}
.result-score-wrap{position:relative;width:140px;height:140px;}
.result-score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-pct{font-family:var(--font-d);font-size:42px;font-weight:900;line-height:1;color:#fff;}
.result-pct small{font-size:18px;}
.result-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px;}
.result-verdict{font-size:14px;font-weight:700;padding:8px 20px;border-radius:var(--radius-sm);border:1px solid;}
.result-cats{width:100%;display:flex;flex-direction:column;gap:8px;}
.rc-row{display:flex;align-items:center;gap:8px;}
.rc-icon{font-size:13px;}
.rc-name{font-size:11px;font-weight:700;width:52px;color:rgba(255,255,255,0.6);}
.rc-track{flex:1;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden;}
.rc-fill{height:100%;border-radius:2px;transition:width 1s ease .3s;}
.rc-pct{font-size:11px;font-weight:700;width:32px;text-align:right;color:#fff;}
.section-hd{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;}
.ans-log{display:flex;flex-direction:column;gap:6px;}
.ans-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:10px;padding:10px 12px;border:1px solid var(--border);border-left:3px solid var(--border);box-shadow:var(--shadow);}
.ar-ok{border-left-color:var(--green)!important;}
.ar-ng{border-left-color:var(--accent)!important;}
.ar-n{font-size:11px;color:var(--text3);min-width:24px;}
.ar-cat{font-size:13px;}
.ar-q{flex:1;font-size:12px;color:var(--text2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.ar-mark{font-size:15px;font-weight:700;}
.ar-ok .ar-mark{color:var(--green);}
.ar-ng .ar-mark{color:var(--accent);}
.ar-cnt{font-size:10px;color:var(--accent);background:var(--accent-bg);padding:2px 7px;border-radius:5px;}
.cta-btn{width:100%;height:var(--tap);background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;font-family:var(--font-d);letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(245,127,23,.25);}
.cta-btn:hover{background:#E65100;}
.ghost-btn{width:100%;height:var(--tap);background:transparent;border:1.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-size:14px;font-family:var(--font-b);cursor:pointer;transition:all .2s;}
.ghost-btn:hover{background:#f0efe8;}
.nb-inner{max-width:480px;margin:0 auto;padding:16px 16px 80px;display:flex;flex-direction:column;gap:12px;}
.nb-nav{display:flex;align-items:center;gap:12px;}
.nb-title{font-family:var(--font-d);font-size:20px;font-weight:900;flex:1;}
.nb-count{font-size:13px;color:var(--text3);}
.nb-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;}
.nb-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.nb-cat{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;}
.nb-actions{display:flex;align-items:center;gap:8px;}
.nb-wc{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--accent-bg);color:var(--accent);}
.nb-star{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);transition:color .2s;line-height:1;}
.nb-star.on{color:var(--gold);}
.nb-resolve{background:var(--green-bg);border:1px solid rgba(29,158,117,.4);border-radius:7px;color:var(--green-d);font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;font-family:var(--font-b);}
.nb-q{font-size:14px;line-height:1.75;margin-bottom:10px;font-weight:500;}
.nb-ans-box{background:var(--green-bg);border-radius:9px;padding:9px 12px;margin-bottom:8px;display:flex;gap:8px;}
.nb-ans-lbl{font-size:11px;color:var(--green-d);font-weight:700;white-space:nowrap;margin-top:1px;}
.nb-ans-val{font-size:13px;color:var(--green-d);line-height:1.5;}
.nb-details{margin-top:4px;}
.nb-summary{font-size:12px;color:var(--text3);cursor:pointer;list-style:none;padding:4px 0;user-select:none;}
.nb-summary::-webkit-details-marker{display:none;}
.nb-exp{font-size:12px;line-height:1.9;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.empty-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:60px 20px;text-align:center;}
.empty-icon{font-size:48px;}
.empty-msg{font-size:16px;font-weight:700;color:var(--text2);}
.empty-sub{font-size:13px;color:var(--text3);}

/* ── PC 2カラム ── */
@media (min-width:769px){
  .home-inner{max-width:920px;padding:28px 32px 60px;}
  .pc-cols{display:flex;gap:24px;align-items:flex-start;}
  .pc-col-main{flex:1;min-width:0;}
  .pc-col-side{width:280px;flex-shrink:0;position:sticky;top:72px;display:flex;flex-direction:column;gap:14px;}
  .quiz-inner{max-width:920px;padding:24px 32px 80px;flex-direction:row;gap:24px;align-items:flex-start;}
  .pc-quiz-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}
  .pc-quiz-side{width:280px;flex-shrink:0;position:sticky;top:72px;display:flex;flex-direction:column;gap:14px;}
  .next-wrap{position:static;background:transparent;padding-top:0;}
  .result-inner{max-width:760px;padding:28px 32px 80px;}
  .nb-inner{max-width:760px;padding:24px 32px 80px;}
  .exp-sp{display:none;}
}
@media (max-width:768px){
  .pc-cols,.pc-quiz-main,.pc-quiz-side{display:contents;}
  .pc-col-side{display:none;}
  .pc-quiz-side{display:none;}
  .quiz-inner{display:flex;}
}
.side-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.side-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.side-stat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.side-stat-row:last-child{border-bottom:none;}
.side-stat-lbl{font-size:13px;color:var(--text2);}
.side-stat-val{font-size:16px;font-weight:700;font-family:var(--font-d);}
.side-cat-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.side-cat-icon{font-size:13px;width:18px;}
.side-cat-name{font-size:11px;color:var(--text2);width:56px;font-weight:700;}
.side-cat-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.side-cat-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.side-cat-pct{font-size:11px;font-weight:700;width:28px;text-align:right;}
.side-exp-placeholder{font-size:13px;color:var(--text3);text-align:center;padding:16px 0;}
.side-exp-verdict{font-size:14px;font-weight:700;margin-bottom:8px;}
.side-exp-body{font-size:13px;line-height:1.9;color:var(--text2);}

/* ── SEOコンテンツ ── */
.seo-section{background:#fff;border-top:1px solid #e5e3dc;padding:32px 0 0;}
.seo-inner{max-width:720px;margin:0 auto;padding:0 16px 40px;}
.seo-h2{font-size:20px;font-weight:700;margin-bottom:10px;color:#1a1a1a;line-height:1.4;}
.seo-h3{font-size:16px;font-weight:700;margin:28px 0 12px;color:#1a1a1a;border-left:3px solid #1D9E75;padding-left:10px;}
.seo-lead{font-size:14px;color:#444;line-height:1.8;margin-bottom:20px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.info-card{background:#f5f4f0;border-radius:10px;padding:12px 14px;}
.info-label{font-size:10px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:4px;}
.info-val{font-size:13px;font-weight:700;color:#1a1a1a;}
.seo-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px;}
.seo-table th{background:#1a2744;color:#fff;padding:8px 12px;text-align:left;font-weight:700;font-size:12px;}
.seo-table td{padding:8px 12px;border-bottom:1px solid #e5e3dc;color:#333;line-height:1.5;}
.seo-table tr:last-child td{border-bottom:none;}
.seo-table tr:nth-child(even) td{background:#f9f8f5;}
.roadmap{display:flex;flex-direction:column;gap:0;margin-bottom:8px;}
.rm-step{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #f0efe8;}
.rm-step:last-child{border-bottom:none;}
.rm-num{width:28px;height:28px;background:#1a2744;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px;}
.rm-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
.rm-desc{font-size:12px;color:#666;line-height:1.6;}
.next-shikaku{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}

<body>
<header class="site-header">
  <a class="site-logo" href="index.html">資格<span>Pass</span></a>
  <a class="site-back" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    資格一覧へ
  </a>
</header>
<div id="app"></div>
<script>
const ALL_QUESTIONS=[
  // ここに問題データを追加してください。
  // 形式サンプル：
  // {
  //   id:1,
  //   category:"AI基礎",
  //   question:"ここに問題文を入力",
  //   choices:["選択肢A","選択肢B","選択肢C","選択肢D"],
  //   answer:0,
  //   explanation:"ここに解説を入力"
  // }
];
const CAT_META={
  "AI基礎":{color:"#185FA5",icon:"🧠",bg:"#E6F1FB"},
  "生成AI基礎":{color:"#7A4A9B",icon:"✨",bg:"#F3EBFE"},
  "技術・動向":{color:"#C43A10",icon:"🚀",bg:"#FEF0EB"},
  "情報リテラシー・倫理":{color:"#0F6E56",icon:"🛡️",bg:"#E1F5EE"},
  "プロンプト活用":{color:"#D4941A",icon:"✍️",bg:"#FEF6E4"}
};
const RANKS=[{min:0,label:"入門",kanji:"入",color:"#999"},{min:10,label:"初段",kanji:"初",color:"#9b7a4a"},{min:30,label:"二段",kanji:"二",color:"#7a9b4a"},{min:60,label:"三段",kanji:"三",color:"#4a7a9b"},{min:100,label:"四段",kanji:"四",color:"#7a4a9b"},{min:150,label:"名人",kanji:"名",color:"#D4941A"}];
const KEY="dojo_v1_genai_passport";
function getRank(n){return[...RANKS].reverse().find(r=>n>=r.min)||RANKS[0];}
function getNext(n){return RANKS.find(r=>r.min>n);}
function sc(p){if(p==null)return"#999";return p>=80?"#0F6E56":p>=60?"#D4941A":"#E8572A";}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch{}return{wrongCounts:{},starIds:[],history:[],totalSessions:0,totalAnswered:0};}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}}
let S={screen:"home",ud:load(),mode:"ALL",fc:"全て",ts:0,shuffle:false,deck:[],idx:0,sel:null,showExp:false,sess:[],tl:null,tout:false,tiv:null};
function setUd(fn){S.ud=typeof fn==="function"?fn(S.ud):fn;save(S.ud);}
function cv(){
  const ud=S.ud,ta=ud.totalAnswered||0,rank=getRank(ta),nr=getNext(ta);
  const rp=nr?Math.round(((ta-rank.min)/(nr.min-rank.min))*100):100;
  const rh=(ud.history||[]).slice(-200);
  const or=rh.length?Math.round(rh.filter(h=>h.correct).length/rh.length*100):null;
  const wq=ALL_QUESTIONS.filter(q=>(ud.wrongCounts||{})[q.id]>0).sort((a,b)=>((ud.wrongCounts[b.id]||0)-(ud.wrongCounts[a.id]||0)));
  const sq=ALL_QUESTIONS.filter(q=>(ud.starIds||[]).includes(q.id));
  const cur=S.deck[S.idx];
  const ia=S.sel!==null||S.tout;
  const ic=S.sel===cur?.answer;
  const sc2=S.sess.filter(a=>a.correct).length;
  const sr=S.sess.length?Math.round(sc2/S.sess.length*100):0;
  const tp=S.ts>0&&S.tl!==null?Math.round(S.tl/S.ts*100):100;
  const tc=tp>50?"#0F6E56":tp>25?"#D4941A":"#E8572A";
  return{ta,rank,rp,or,wq,sq,cur,ia,ic,sc2,sr,tp,tc};
}
function startTimer(){clearInterval(S.tiv);if(S.ts===0||S.sel!==null||S.tout)return;S.tl=S.ts;S.tiv=setInterval(()=>{S.tl--;if(S.tl<=0){clearInterval(S.tiv);S.tout=true;S.showExp=true;}render();},1000);}
function go(om){
  clearInterval(S.tiv);const m=om||S.mode;
  let pool=[...ALL_QUESTIONS];
  if(m==="WEAK")pool=ALL_QUESTIONS.filter(q=>(S.ud.wrongCounts||{})[q.id]>0);
  else if(m==="STAR")pool=ALL_QUESTIONS.filter(q=>(S.ud.starIds||[]).includes(q.id));
  else if(S.fc!=="全て")pool=pool.filter(q=>q.category===S.fc);
  if(!pool.length)return;if(om)S.mode=om;
  S.deck=S.shuffle?shuf(pool):pool;S.idx=0;S.sel=null;S.showExp=false;S.sess=[];S.tout=false;S.tl=null;
  S.screen="quiz";render();startTimer();
}
function pick(i){
  if(S.sel!==null||S.tout)return;clearInterval(S.tiv);S.sel=i;S.showExp=true;
  const q=S.deck[S.idx];const ok=i===q.answer;
  setUd(p=>({...p,wrongCounts:{...p.wrongCounts,[q.id]:ok?Math.max(0,(p.wrongCounts||{})[q.id]||0):((p.wrongCounts||{})[q.id]||0)+1},history:[...(p.history||[]).slice(-499),{id:q.id,correct:ok,ts:Date.now()}],totalAnswered:(p.totalAnswered||0)+1}));
  render();
}
function next(){
  const q=S.deck[S.idx];const ok=S.sel===q.answer;
  S.sess=[...S.sess,{q,correct:ok,sel:S.sel}];
  if(S.idx+1>=S.deck.length){setUd(p=>({...p,totalSessions:(p.totalSessions||0)+1}));S.screen="result";render();}
  else{S.idx++;S.sel=null;S.showExp=false;S.tout=false;S.tl=null;render();startTimer();}
}
function star(id){setUd(p=>({...p,starIds:(p.starIds||[]).includes(id)?(p.starIds||[]).filter(s=>s!==id):[...(p.starIds||[]),id]}));render();}
function clrWrong(id){setUd(p=>{const wc={...p.wrongCounts};delete wc[id];return{...p,wrongCounts:wc};});render();}
function reset(){if(confirm("学習データをすべてリセットしますか？")){const d={wrongCounts:{},starIds:[],history:[],totalSessions:0,totalAnswered:0};save(d);S.ud=d;render();}}
function render(){document.getElementById("app").innerHTML=build();}
const arr=()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
const bk=()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
const bksvg=()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>`;

function catStats(){
  return Object.keys(CAT_META).map(cat=>{
    const h=(S.ud.history||[]).filter(h=>{const q=ALL_QUESTIONS.find(q=>q.id===h.id);return q&&q.category===cat;});
    if(!h.length)return`<div class="side-cat-row"><span class="side-cat-icon">${CAT_META[cat].icon}</span><span class="side-cat-name">${cat}</span><div class="side-cat-track"></div><span class="side-cat-pct" style="color:#999">—</span></div>`;
    const r=Math.round(h.filter(x=>x.correct).length/h.length*100);
    return`<div class="side-cat-row"><span class="side-cat-icon">${CAT_META[cat].icon}</span><span class="side-cat-name">${cat}</span><div class="side-cat-track"><div class="side-cat-fill" style="width:${r}%;background:${CAT_META[cat].color}"></div></div><span class="side-cat-pct" style="color:${sc(r)}">${r}%</span></div>`;
  }).join("");
}

function build(){
  const C=cv();
  if(S.screen==="home")return home(C);
  if(S.screen==="quiz")return quiz(C);
  if(S.screen==="result")return result(C);
  if(S.screen==="notebook")return notebook(C);
  return"";
}

function home(C){
  const{ta,rank,rp,or,wq,sq}=C;
  const startOff=!ALL_QUESTIONS.length||(S.mode==="WEAK"&&!wq.length)||(S.mode==="STAR"&&!sq.length);
  const cats=["全て",...Object.keys(CAT_META)];
  const left=`
    <div class="card">
      <div class="card-title">モード選択</div>
      <div class="mode-row">
        ${[{k:"ALL",lbl:"全問",ic:"📚",cnt:ALL_QUESTIONS.length,dis:false},{k:"WEAK",lbl:"弱点特訓",ic:"🔥",cnt:wq.length,dis:!wq.length},{k:"STAR",lbl:"★登録",ic:"⭐",cnt:sq.length,dis:!sq.length}].map(m=>`<button class="mode-btn ${S.mode===m.k?"mode-active":""} ${m.dis?"mode-off":""}" onclick="${m.dis?"":"S.mode='"+m.k+"';render()"}"><span class="mode-icon">${m.ic}</span><span class="mode-label">${m.lbl}</span><span class="mode-count">${m.cnt}問</span></button>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-title">カテゴリ</div>
      <div class="cat-row ${S.mode!=="ALL"?"hidden":""}">
        ${cats.map(c=>{const a=S.fc===c;const m=CAT_META[c];const s="";return`<button class="cat-chip ${a?"active":""}" style="${s}" onclick="S.fc='${c}';render()">${c!=="全て"&&m?m.icon+" ":""}${c}</button>`;}).join("")}
      </div>
      ${S.mode!=="ALL"?`<p style="font-size:12px;color:var(--text3);">弱点・スターモード時はカテゴリ絞り込み不可</p>`:""}
    </div>
    <div class="card">
      <div class="card-title">オプション</div>
      <div class="opts-row">
        <div class="opt-group"><span class="opt-label">⏱</span>${[0,30,60].map(t=>`<button class="opt-pill ${S.ts===t?"on":""}" onclick="S.ts=${t};render()">${t===0?"なし":t+"s"}</button>`).join("")}</div>
        <button class="opt-pill opt-shuffle ${S.shuffle?"on":""}" onclick="S.shuffle=!S.shuffle;render()">🔀 ${S.shuffle?"シャッフル":"順番通り"}</button>
      </div>
    </div>
    ${!ALL_QUESTIONS.length?`<div class="card" style="border-style:dashed;background:#faf9f6;"><div class="card-title">テンプレート案内</div><p style="font-size:13px;line-height:1.8;color:var(--text2);">このファイルは生成AIパスポート用の雛形です。問題は未登録のため、<code>ALL_QUESTIONS</code> にデータを追加してからご利用ください。</p></div>`:""}
    <button class="start-btn ${startOff?"off":""}" onclick="${startOff?"":"go()"}">学習開始 ${arr()}</button>
    <button class="text-link" onclick="reset()">データをリセット</button>`;
  const right=`
    <div class="side-panel">
      <div class="side-title">学習統計</div>
      <div class="side-stat-row"><span class="side-stat-lbl">通算解答数</span><span class="side-stat-val">${ta}</span></div>
      <div class="side-stat-row"><span class="side-stat-lbl">通算正答率</span><span class="side-stat-val" style="color:${sc(or)}">${or!==null?or+"%":"—"}</span></div>

function quiz(C){
  const{cur,ia,ic,sc2,tp,tc}=C;
  if(!cur)return"";
  const sw=S.sess.filter(a=>!a.correct).length;
  const isStar=(S.ud.starIds||[]).includes(cur.id);
  const pp=Math.round(((S.idx+1)/S.deck.length)*100);
  const al=["A","B","C","D"];
  const dots=()=>{let h=S.sess.map(a=>`<div class="sb-dot ${a.correct?"sd-ok":"sd-ng"}"></div>`).join("");h+=`<div class="sb-dot sd-cur"></div>`;const f=Math.min(3,S.deck.length-S.idx-1);for(let i=0;i<f;i++)h+=`<div class="sb-dot sd-future"></div>`;const m=S.deck.length-S.idx-f-1;if(m>0)h+=`<span class="sb-more">+${m}</span>`;return h;};
  const ch=cur.choices.map((c,i)=>{let cls="choice";let icon="";if(ia){if(i===cur.answer){cls+=" ch-ok";icon=`<span class="ch-icon">✓</span>`;}else if(i===S.sel){cls+=" ch-ng";icon=`<span class="ch-icon">✗</span>`;}else cls+=" ch-fade";}return`<button class="${cls}" onclick="pick(${i})"><span class="ch-alpha">${al[i]}</span><span class="ch-body">${c}</span>${icon}</button>`;}).join("");
  const mc=(S.ud.wrongCounts||{})[cur.id]||0;
  const tim=S.ts>0?`<div class="timer-wrap"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="none" stroke="#e5e3dc" stroke-width="4"/><circle cx="24" cy="24" r="20" fill="none" stroke="${tc}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${tp*1.257} 125.7" transform="rotate(-90 24 24)" style="transition:stroke-dasharray .9s linear"/></svg><span class="timer-num" style="color:${tc}">${S.tout?"✕":(S.tl||"")}</span></div>`:"";
  let expSP="";
  if(S.showExp){const cls=ic&&!S.tout?"exp-ok":S.tout?"exp-time":"exp-ng";const v=S.tout?"⏰ 時間切れ":ic?"✓ 正解！":"✗ 不正解";expSP=`<div class="exp-card exp-sp ${cls}"><div class="exp-head"><span class="exp-verdict">${v}</span>${S.tout?`<span class="exp-ans">正解：${al[cur.answer]}</span>`:""}</div><p class="exp-body">${cur.explanation}</p></div>`;}
  const expPC=()=>{if(!ia)return`<div class="side-panel"><div class="side-title">解説</div><div class="side-exp-placeholder">選択肢を選ぶと解説が表示されます</div></div>`;const v=ic&&!S.tout?"✓ 正解！":S.tout?"⏰ 時間切れ":"✗ 不正解";const vc=ic&&!S.tout?"#0F6E56":S.tout?"#D4941A":"#E8572A";return`<div class="side-panel"><div class="side-title">解説</div><div class="side-exp-verdict" style="color:${vc}">${v}${S.tout?` — 正解：${al[cur.answer]}`:""}</div><div class="side-exp-body">${cur.explanation}</div></div>`;};
  const stPC=`<div class="side-panel"><div class="side-title">セッション</div><div class="side-stat-row"><span class="side-stat-lbl">正解</span><span class="side-stat-val" style="color:#0F6E56">${sc2}</span></div><div class="side-stat-row"><span class="side-stat-lbl">不正解</span><span class="side-stat-val" style="color:#E8572A">${sw}</span></div><div class="side-stat-row"><span class="side-stat-lbl">残り</span><span class="side-stat-val">${S.deck.length-S.sess.length-1}</span></div><div style="margin-top:10px;">${catStats()}</div></div>`;
  return`<div class="quiz-inner">
    <div class="pc-quiz-main">
      <div class="quiz-nav"><button class="nav-back" onclick="clearInterval(S.tiv);S.screen='home';render()">${bk()}</button><div class="quiz-counter"><span class="qc-cur">${S.idx+1}</span><span class="qc-sep">/</span><span class="qc-tot">${S.deck.length}</span></div><button class="star-btn ${isStar?"on":""}" onclick="star(${cur.id})">${isStar?"★":"☆"}</button></div>
      <div class="q-progress"><div class="q-prog-fill" style="width:${pp}%"></div></div>
      ${tim}
      <div class="session-bar"><span class="sb-ok">✓ ${sc2}</span><div class="sb-dots">${dots()}</div><span class="sb-ng">✗ ${sw}</span></div>
      <div class="q-card"><div class="q-card-head"><span class="q-cat-badge" style="background:${CAT_META[cur.category]?.bg};color:${CAT_META[cur.category]?.color};border-color:${CAT_META[cur.category]?.color}55">${CAT_META[cur.category]?.icon} ${cur.category}</span>${mc>0?`<span class="q-miss">⚡ ${mc}回ミス</span>`:""}</div><p class="q-text">${cur.question}</p></div>
      <div class="choices">${ch}</div>
      ${expSP}
      ${ia?`<div class="next-wrap"><button class="next-btn" onclick="next()">${S.idx+1>=S.deck.length?"結果を見る":"次の問題"} ${arr()}</button></div>`:""}
    </div>
    <div class="pc-quiz-side">${expPC()}${stPC}</div>
  </div>`;
}

function result(C){
  const{sc2,sr}=C;
  const v=sr>=80?"🏆 かなり仕上がっています":sr>=60?"✅ 基礎は身についています":"📚 重要テーマを復習しましょう";
  const vc=sc(sr);
  const cats=Object.keys(CAT_META).map(cat=>{const qs=S.sess.filter(a=>a.q.category===cat);if(!qs.length)return"";const r=Math.round(qs.filter(a=>a.correct).length/qs.length*100);return`<div class="rc-row"><span class="rc-icon">${CAT_META[cat].icon}</span><span class="rc-name">${cat}</span><div class="rc-track"><div class="rc-fill" style="width:${r}%;background:${CAT_META[cat].color}"></div></div><span class="rc-pct">${r}%</span></div>`;}).join("");
  const log=S.sess.map((a,i)=>{const wc=(S.ud.wrongCounts||{})[a.q.id]||0;return`<div class="ans-row ${a.correct?"ar-ok":"ar-ng"}"><span class="ar-n">Q${i+1}</span><span class="ar-cat">${CAT_META[a.q.category]?.icon}</span><span class="ar-q">${a.q.question.slice(0,30)}…</span><span class="ar-mark">${a.correct?"✓":"✗"}</span>${!a.correct?`<span class="ar-cnt">×${wc}</span>`:""}</div>`;}).join("");
  return`<div class="result-inner">
    <div class="result-hero">
      <p class="result-eyebrow">演習完了</p>
      <div class="result-score-wrap"><svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="58" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="10"/><circle cx="70" cy="70" r="58" fill="none" stroke="${vc}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${sr*3.644} 364.4" transform="rotate(-90 70 70)" style="transition:stroke-dasharray 1s ease .3s"/></svg><div class="result-score-inner"><span class="result-pct" style="color:${vc}">${sr}<small>%</small></span><span class="result-sub">${sc2}/${S.sess.length}</span></div></div>
      <div class="result-verdict" style="color:${vc};border-color:${vc}66;background:${vc}22">${v}</div>
      <div class="result-cats">${cats}</div>
    </div>
    <div class="section-hd">問題別レビュー</div>
    <div class="ans-log">${log}</div>
    <button class="cta-btn" onclick="go()">もう一度</button>
    <button class="ghost-btn" onclick="go('WEAK')">弱点だけ特訓</button>
    <button class="ghost-btn" onclick="S.screen='home';render()">ホームへ戻る</button>
  </div>`;
}

function notebook(C){
  const{wq}=C;const al=["A","B","C","D"];
  const cards=wq.map(q=>{const wc=(S.ud.wrongCounts||{})[q.id]||0;const is=(S.ud.starIds||[]).includes(q.id);return`<div class="nb-card"><div class="nb-card-top"><span class="nb-cat" style="color:${CAT_META[q.category]?.color};background:${CAT_META[q.category]?.bg};border-color:${CAT_META[q.category]?.color}55">${CAT_META[q.category]?.icon} ${q.category}</span><div class="nb-actions"><span class="nb-wc">✗ ${wc}回</span><button class="nb-star ${is?"on":""}" onclick="star(${q.id})">${is?"★":"☆"}</button><button class="nb-resolve" onclick="clrWrong(${q.id})">解決</button></div></div><p class="nb-q">${q.question}</p><div class="nb-ans-box"><span class="nb-ans-lbl">正解</span><span class="nb-ans-val">${al[q.answer]}. ${q.choices[q.answer]}</span></div><details class="nb-details"><summary class="nb-summary">解説を見る ▾</summary><p class="nb-exp">${q.explanation}</p></details></div>`;}).join("");
  return`<div class="nb-inner"><div class="nb-nav"><button class="nav-back" onclick="S.screen='home';render()">${bk()}</button><span class="nb-title">間違いノート</span><span class="nb-count">${wq.length}問</span></div>${wq.length===0?`<div class="empty-wrap"><div class="empty-icon">🎉</div><p class="empty-msg">まだ復習対象の問題はありません</p><p class="empty-sub">問題データを追加すると、この欄に復習ノートが表示されます。</p></div>`:`<div>${cards}</div>`}</div>`;
}
render();
</script>
