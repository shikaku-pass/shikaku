  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── DATA ─────────────────────────────────────────────────────
    const ALL_QUESTIONS = [
      { id:1,  category:"法令",    question:"危険物取扱者免状の種類として、正しいものはどれか。", choices:["甲種・乙種・丙種の3種類","甲種・乙種の2種類","甲種・乙種・丙種・丁種の4種類","乙種・丙種の2種類"], answer:0, explanation:"危険物取扱者免状は「甲種」「乙種（第1〜6類）」「丙種」の3種類です。甲種はすべての危険物、乙種は取得した類のみ、丙種はガソリン等の指定品目のみ取り扱えます。" },
      { id:2,  category:"物理化学", question:"ガソリンの引火点として、最も近いものはどれか。", choices:["約 −40℃以下","約 0℃","約 21℃","約 70℃"], answer:0, explanation:"ガソリンの引火点は −40℃以下と非常に低く、常温でも引火の危険があります。第4類の中でも特に危険性が高い理由の一つです。" },
      { id:3,  category:"性質消火", question:"第4類危険物（引火性液体）の共通する性質として、誤っているものはどれか。", choices:["引火性の液体である","蒸気は空気より重い","すべて水より軽い","電気の不良導体が多い"], answer:2, explanation:"第4類危険物のほとんどは水より軽いですが、二硫化炭素（比重1.26）やクロロベンゼンなど水より重いものも存在します。「すべて水より軽い」は誤りです。" },
      { id:4,  category:"法令",    question:"製造所等の設置許可の申請先として、正しいものはどれか。", choices:["消防庁長官","都道府県知事または市町村長","経済産業大臣","国土交通大臣"], answer:1, explanation:"危険物施設を設置する場合は、その場所を管轄する市町村長等（市町村長または都道府県知事）に許可申請を行います。" },
      { id:5,  category:"物理化学", question:"燃焼の三要素として、正しい組み合わせはどれか。", choices:["可燃物・酸素・点火源（熱）","可燃物・水素・点火源（熱）","可燃物・酸素・二酸化炭素","可燃物・窒素・点火源（熱）"], answer:0, explanation:"燃焼には「可燃物」「酸素供給源」「点火源（熱）」の三要素が必要です。消火はこのいずれかを除去します。" },
      { id:6,  category:"性質消火", question:"灯油の特性として、正しいものはどれか。", choices:["引火点は10℃以下","ガソリンより引火点が高い","水に溶けやすい","燃焼範囲はガソリンより広い"], answer:1, explanation:"灯油の引火点は40℃以上で、ガソリン（−40℃以下）よりはるかに高いです。灯油は非水溶性で水には溶けません。" },
      { id:7,  category:"法令",    question:"危険物の運搬容器に表示しなければならない事項として、誤っているものはどれか。", choices:["危険物の品名","危険物の数量","取扱者の氏名","注意事項"], answer:2, explanation:"運搬容器への表示義務事項は品名・危険等級・化学名・数量・注意事項などです。取扱者の氏名は含まれません。" },
      { id:8,  category:"物理化学", question:"静電気による引火を防止するための措置として、最も適切でないものはどれか。", choices:["接地（アース）を行う","空気を乾燥させる","導電性の高い素材を使用する","流速を遅くする"], answer:1, explanation:"静電気は乾燥した環境で発生しやすくなります。「空気を乾燥させる」は静電気を増加させるため防止策として誤りです。" },
      { id:9,  category:"性質消火", question:"第4類危険物の火災に対して、適応する消火剤として誤っているものはどれか。", choices:["泡消火剤","二酸化炭素消火剤","ハロゲン化物消火剤","棒状の水"], answer:3, explanation:"第4類危険物の火災に棒状の水を使用すると、燃えている液体が飛散して拡大します。適応は泡・CO₂・粉末・ハロゲン化物です。" },
      { id:10, category:"法令",    question:"セルフ式給油取扱所で顧客が自ら給油できる根拠として正しいものはどれか。", choices:["甲種危険物取扱者が常駐しているから","消防法の特例により認められているから","第4類は危険物に該当しないから","給油取扱所は規制対象外だから"], answer:1, explanation:"セルフ式給油取扱所では消防法の特例により顧客による給油が認められています。容器への詰め替えは有資格者が必要です。" },
      { id:11, category:"物理化学", question:"引火点と発火点の説明として正しいものはどれか。", choices:["引火点は点火源なしで燃え始める最低温度","発火点は点火源ありで燃え始める最低温度","引火点は点火源ありで引火する最低温度","引火点と発火点は同じ温度を指す"], answer:2, explanation:"引火点は点火源がある状態で可燃性蒸気が引火する最低温度。発火点は点火源なしに自ら発火する最低温度です。" },
      { id:12, category:"法令",    question:"危険物保安監督者について誤っているものはどれか。", choices:["甲種または乙種危険物取扱者でなければならない","6ヶ月以上の実務経験が必要","選任・解任は市町村長等に届け出","製造所等の所有者が選任する"], answer:2, explanation:"危険物保安監督者の選任・解任の届け出先は「所轄消防長または消防署長」です。市町村長等ではありません。" },
      { id:13, category:"性質消火", question:"アルコール類の火災消火に関して誤っているものはどれか。", choices:["水に溶けやすい","引火しやすい","通常の泡消火剤で有効に消火できる","蒸気は有害である"], answer:2, explanation:"アルコール類は水溶性のため通常の泡消火剤は消泡してしまい効果がありません。耐アルコール泡消火剤が必要です。" },
      { id:14, category:"物理化学", question:"爆発範囲（燃焼範囲）について正しいものはどれか。", choices:["爆発下限界が低いほど安全","爆発上限界が高いほど危険","爆発範囲が広いほど危険性が高い","灯油はガソリンより爆発範囲が広い"], answer:2, explanation:"爆発範囲が広いほど多くの混合比で爆発が起こりうるため危険性が高くなります。下限界が低いほど少量でも引火しやすいです。" },
      { id:15, category:"法令",    question:"危険物取扱者の保安講習受講義務として正しいものはどれか。", choices:["免状取得後は受講不要","3年に1回受講が義務","毎年受講が義務","施設勤務者のみ受講義務"], answer:1, explanation:"危険物取扱者は原則3年に1回、都道府県知事が行う保安講習を受講する義務があります。現に取扱い作業に従事している者が対象です。" },
    ];

    const CAT_META = {
      "法令":    { color:"#E8572A", icon:"⚖️", bg:"rgba(232,87,42,0.12)"  },
      "物理化学": { color:"#4A9EE8", icon:"🔬", bg:"rgba(74,158,232,0.12)" },
      "性質消火": { color:"#3DB87A", icon:"🔥", bg:"rgba(61,184,122,0.12)" },
    };
    const RANK_THRESHOLDS = [
      { min:0,   label:"入門",  kanji:"入", color:"#888"    },
      { min:10,  label:"初段",  kanji:"初", color:"#9b7a4a" },
      { min:30,  label:"二段",  kanji:"二", color:"#7a9b4a" },
      { min:60,  label:"三段",  kanji:"三", color:"#4a7a9b" },
      { min:100, label:"四段",  kanji:"四", color:"#7a4a9b" },
      { min:150, label:"名人",  kanji:"名", color:"#E8A020" },
    ];
    function getRank(total) {
      return [...RANK_THRESHOLDS].reverse().find(r => total >= r.min) || RANK_THRESHOLDS[0];
    }
    function getNextRank(total) {
      return RANK_THRESHOLDS.find(r => r.min > total);
    }

    const STORAGE_KEY = "dojo_v3";
    function loadData() {
      try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch {}
      return { wrongCounts:{}, starIds:[], history:[], totalSessions:0, totalAnswered:0 };
    }
    function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
    function shuffle(a) {
      const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b;
    }
    function scoreColor(p) {
      if (p===null||p===undefined) return "#555";
      return p>=80?"#3DB87A":p>=60?"#E8A020":"#E8572A";
    }

    // ─── CSS ──────────────────────────────────────────────────────
    const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

:root {

  --ink2: #161620;
  --ink3: #1E1E2A;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --red: #E8572A;
  --gold: #E8A020;
  --green: #3DB87A;
  --blue: #4A9EE8;
  --text: #ECEAF4;
  --text2: #A09EB8;
  --text3: #5A5870;
  --font-d: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
  --font-b: 'Noto Sans JP', sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
  --tap: 52px;
}

    radial-gradient(ellipse 80% 40% at 15% 0%,rgba(232,87,42,0.08) 0%,transparent 60%),

    var(--ink);
  color:var(--text);
  display:flex;justify-content:center;
}

}

.cta-btn{

  letter-spacing:1px;box-shadow:0 4px 20px rgba(232,87,42,.4);
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s;

.nb-nav{display:flex;align-items:center;gap:12px;padding-top:16px;}

}

  transition:all .2s;

.empty-sub{font-size:13px;color:var(--text3);}
`;

    // ─── MAIN ─────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("home");
      const [ud, setUdRaw] = useState(loadData);
      const [mode, setMode] = useState("ALL");
      const [filterCat, setFilterCat] = useState("全て");
      const [timerSec, setTimerSec] = useState(0);
      const [doShuffle, setDoShuffle] = useState(true);

      const [deck, setDeck] = useState([]);
      const [idx, setIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showExp, setShowExp] = useState(false);
      const [sessionAns, setSessionAns] = useState([]);
      const [timeLeft, setTimeLeft] = useState(null);
      const [timedOut, setTimedOut] = useState(false);
      const [animKey, setAnimKey] = useState(0);
      const timerRef = useRef(null);

      function setUd(fn) {
        setUdRaw(prev => { const next=typeof fn==="function"?fn(prev):fn; saveData(next); return next; });
      }

      const totalAnswered = ud.totalAnswered || 0;
      const rank = getRank(totalAnswered);
      const nextRank = getNextRank(totalAnswered);
      const rankProgress = nextRank ? Math.round(((totalAnswered - rank.min) / (nextRank.min - rank.min)) * 100) : 100;
      const recentHist = (ud.history||[]).slice(-200);
      const overallRate = recentHist.length>0 ? Math.round(recentHist.filter(h=>h.correct).length/recentHist.length*100) : null;
      const weakQs = ALL_QUESTIONS.filter(q=>(ud.wrongCounts||{})[q.id]>0).sort((a,b)=>(ud.wrongCounts[b.id]||0)-(ud.wrongCounts[a.id]||0));
      const starQs = ALL_QUESTIONS.filter(q=>(ud.starIds||[]).includes(q.id));

      useEffect(()=>{
        if(screen!=="quiz"||timerSec===0||selected!==null||timedOut) return;
        setTimeLeft(timerSec);
        clearInterval(timerRef.current);
        timerRef.current=setInterval(()=>{
          setTimeLeft(t=>{
            if(t<=1){clearInterval(timerRef.current);setTimedOut(true);setShowExp(true);return 0;}
            return t-1;
          });
        },1000);
        return ()=>clearInterval(timerRef.current);
      },[idx,animKey,screen]);

      function startQuiz(overrideMode) {
        const m=overrideMode||mode;
        let pool=[...ALL_QUESTIONS];
        if(m==="WEAK") pool=ALL_QUESTIONS.filter(q=>(ud.wrongCounts||{})[q.id]>0);
        else if(m==="STAR") pool=ALL_QUESTIONS.filter(q=>(ud.starIds||[]).includes(q.id));
        else if(filterCat!=="全て") pool=pool.filter(q=>q.category===filterCat);
        if(pool.length===0) return;
        const d=doShuffle?shuffle(pool):pool;
        setDeck(d); setIdx(0); setSelected(null); setShowExp(false);
        setSessionAns([]); setTimedOut(false); setAnimKey(k=>k+1);
        if(overrideMode) setMode(overrideMode);
        setScreen("quiz");
      }

      function handleSelect(i) {
        if(selected!==null||timedOut) return;
        clearInterval(timerRef.current);
        setSelected(i);
        setShowExp(true);
        const q=deck[idx];
        const correct=i===q.answer;
        setUd(prev=>({
          ...prev,
          wrongCounts:{...prev.wrongCounts,[q.id]:correct?Math.max(0,(prev.wrongCounts||{})[q.id]||0):(((prev.wrongCounts||{})[q.id]||0)+1)},
          history:[...(prev.history||[]).slice(-499),{id:q.id,correct,ts:Date.now()}],
          totalAnswered:(prev.totalAnswered||0)+1,
        }));
      }

      function handleNext() {
        const q=deck[idx]; const correct=selected===q.answer;
        setSessionAns(prev=>[...prev,{q,correct,selected}]);
        if(idx+1>=deck.length){
          setUd(prev=>({...prev,totalSessions:(prev.totalSessions||0)+1}));
          setScreen("result");
        } else {
          setIdx(i=>i+1); setSelected(null); setShowExp(false); setTimedOut(false); setAnimKey(k=>k+1);
        }
      }

      function toggleStar(id) {
        setUd(prev=>({...prev,starIds:(prev.starIds||[]).includes(id)?(prev.starIds||[]).filter(s=>s!==id):[...(prev.starIds||[]),id]}));
      }
      function clearWrong(id) {
        setUd(prev=>{const wc={...prev.wrongCounts};delete wc[id];return{...prev,wrongCounts:wc};});
      }

      const current=deck[idx];
      const isAnswered=selected!==null||timedOut;
      const isCorrect=selected===current?.answer;
      const sessCorrect=sessionAns.filter(a=>a.correct).length;
      const sessRate=sessionAns.length>0?Math.round(sessCorrect/sessionAns.length*100):0;
      const timerPct=timerSec>0&&timeLeft!==null?Math.round(timeLeft/timerSec*100):100;
      const timerColor=timerPct>50?"#3DB87A":timerPct>25?"#E8A020":"#E8572A";

      return (
        <div className="root">
          <style>{CSS}</style>

          {screen==="home"&&(
            <div className="home-shell fadeUp">
              <header className="home-topbar">
                <div className="home-logo">
                  <svg width="22" height="22" viewBox="0 0 36 36">
                    <polygon points="18,2 34,30 2,30" fill="none" stroke="#E8572A" strokeWidth="2.5" strokeLinejoin="round"/>
                    <line x1="18" y1="10" x2="18" y2="22" stroke="#E8572A" strokeWidth="2.5" strokeLinecap="round"/>
                    <circle cx="18" cy="26" r="1.5" fill="#E8572A"/>
                  </svg>
                  <span className="home-brand">錬成道場</span>
                </div>
                <button className="home-nb-btn" onClick={()=>setScreen("notebook")}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    <line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/>
                  </svg>
                  {weakQs.length>0&&<span className="home-nb-dot"/>}
                </button>
              </header>

              <div className="home-hero">
                <div className="home-hero-left">
                  <span className="home-exam-type">乙種第4類</span>
                  <span className="home-exam-name">危険物取扱者</span>
                  <div className="home-stats-row">
                    <div className="home-stat">
                      <span className="hs-num" style={{color:scoreColor(overallRate)}}>
                        {overallRate!==null?`${overallRate}%`:"—"}
                      </span>
                      <span className="hs-lbl">正答率</span>
                    </div>
                    <div className="home-stat-div"/>
                    <div className="home-stat">
                      <span className="hs-num">{totalAnswered}</span>
                      <span className="hs-lbl">解答数</span>
                    </div>
                    {weakQs.length>0&&<>
                      <div className="home-stat-div"/>
                      <div className="home-stat">
                        <span className="hs-num" style={{color:"#E8572A"}}>{weakQs.length}</span>
                        <span className="hs-lbl">要復習</span>
                      </div>
                    </>}
                  </div>
                </div>
                <div className="home-rank" style={{borderColor:rank.color+"55",background:rank.color+"0e"}}>
                  <span className="home-rank-k" style={{color:rank.color}}>{rank.kanji}</span>
                  <span className="home-rank-l" style={{color:rank.color}}>{rank.label}</span>
                  <div className="home-rank-bar">
                    <div style={{width:`${rankProgress}%`,height:"100%",background:rank.color,borderRadius:2,transition:"width 1s ease"}}/>
                  </div>
                </div>
              </div>

              <div className="home-bottom">
                <div className="home-modes">
                  {[
                    {k:"ALL",  label:"全問",   icon:"📚", count:ALL_QUESTIONS.length},
                    {k:"WEAK", label:"弱点特訓", icon:"🔥", count:weakQs.length, disabled:weakQs.length===0},
                    {k:"STAR", label:"★登録",   icon:"⭐", count:starQs.length,  disabled:starQs.length===0},
                  ].map(({k,label,icon,count,disabled})=>(
                    <button key={k}
                      className={`hm-btn ${mode===k?"hm-active":""} ${disabled?"hm-off":""}`}
                      onClick={()=>!disabled&&setMode(k)}>
                      <span className="hm-icon">{icon}</span>
                      <span className="hm-label">{label}</span>
                      <span className="hm-count">{count}問</span>
                    </button>
                  ))}
                </div>

                <div className={`home-cats ${mode==="ALL"?"":"home-cats-hidden"}`}>
                  {["全て",...Object.keys(CAT_META)].map(cat=>(
                    <button key={cat}
                      className={`hc-chip ${filterCat===cat?"hc-active":""}`}
                      style={filterCat===cat&&cat!=="全て"?{background:CAT_META[cat].bg,borderColor:CAT_META[cat].color,color:CAT_META[cat].color}:{}}
                      onClick={()=>setFilterCat(cat)}>
                      {cat!=="全て"&&CAT_META[cat].icon+" "}{cat}
                    </button>
                  ))}
                </div>

                <div className="home-opts">
                  <div className="ho-timer">
                    <span className="ho-label">⏱</span>
                    {[0,30,60].map(t=>(
                      <button key={t} className={`ho-pill ${timerSec===t?"ho-on":""}`} onClick={()=>setTimerSec(t)}>
                        {t===0?"なし":`${t}s`}
                      </button>
                    ))}
                  </div>
                  <button className={`ho-pill ho-shuffle ${doShuffle?"ho-on":""}`} onClick={()=>setDoShuffle(v=>!v)}>
                    🔀 {doShuffle?"ON":"OFF"}
                  </button>
                </div>

                <button
                  className={`home-start ${(mode==="WEAK"&&weakQs.length===0)||(mode==="STAR"&&starQs.length===0)?"home-start-off":""}`}
                  onClick={()=>startQuiz()}>
                  修行開始
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                  </svg>
                </button>

                <button className="text-btn" onClick={()=>{if(window.confirm("学習データをすべてリセットしますか？")){saveData({wrongCounts:{},starIds:[],history:[],totalSessions:0,totalAnswered:0});setUdRaw(loadData());}}}>データをリセット</button>
              </div>
            </div>
          )}

          {screen==="quiz"&&current&&(
            <div className="page quiz-page">
              <div className="quiz-nav">
                <button className="nav-back" onClick={()=>{clearInterval(timerRef.current);setScreen("home")}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                  </svg>
                </button>
                <div className="quiz-counter">
                  <span className="qc-cur">{idx+1}</span>
                  <span className="qc-sep">/</span>
                  <span className="qc-tot">{deck.length}</span>
                </div>
                <button className={`star-nav-btn ${(ud.starIds||[]).includes(current.id)?"on":""}`}
                  onClick={()=>toggleStar(current.id)}>
                  {(ud.starIds||[]).includes(current.id)?"★":"☆"}
                </button>
              </div>

              <div className="q-progress">
                <div className="q-prog-fill" style={{width:`${((idx+1)/deck.length)*100}%`}}/>
              </div>

              {timerSec>0&&(
                <div className="timer-wrap">
                  <svg width="48" height="48" viewBox="0 0 48 48">
                    <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="4"/>
                    <circle cx="24" cy="24" r="20" fill="none" stroke={timerColor} strokeWidth="4"
                      strokeLinecap="round" strokeDasharray={`${timerPct*1.257} 125.7`}
                      transform="rotate(-90 24 24)" style={{transition:"stroke-dasharray .9s linear,stroke .3s"}}/>
                  </svg>
                  <span className="timer-num" style={{color:timerColor}}>{timedOut?"✕":timeLeft}</span>
                </div>
              )}

              <div className="session-bar">
                <span className="sb-correct">✓ {sessionAns.filter(a=>a.correct).length}</span>
                <div className="sb-dots">
                  {sessionAns.map((a,i)=>(
                    <div key={i} className={`sb-dot ${a.correct?"sd-ok":"sd-ng"}`}/>
                  ))}
                  <div className="sb-dot sd-cur"/>
                  {deck.slice(idx+1,idx+4).map((_,i)=>(
                    <div key={`f${i}`} className="sb-dot sd-future"/>
                  ))}
                  {deck.length-idx-4>0&&<span className="sb-more">+{deck.length-idx-4}</span>}
                </div>
                <span className="sb-wrong">✗ {sessionAns.filter(a=>!a.correct).length}</span>
              </div>

              <div key={animKey} className="q-card slideIn">
                <div className="q-card-header">
                  <span className="q-cat-badge" style={{background:CAT_META[current.category]?.bg||"rgba(255,255,255,0.08)",color:CAT_META[current.category]?.color||"#aaa",borderColor:(CAT_META[current.category]?.color||"#aaa")+"44"}}>
                    {CAT_META[current.category]?.icon} {current.category}
                  </span>
                  {(ud.wrongCounts||{})[current.id]>0&&(
                    <span className="q-miss-badge">⚡ {ud.wrongCounts[current.id]}回ミス</span>
                  )}
                </div>
                <p className="q-text">{current.question}</p>
              </div>

              <div className="choices-wrap">
                {current.choices.map((ch,i)=>{
                  const alpha=["A","B","C","D"][i];
                  let cls="choice-btn";
                  if(isAnswered){
                    if(i===current.answer) cls+=" ch-correct";
                    else if(i===selected) cls+=" ch-wrong";
                    else cls+=" ch-faded";
                  }
                  return (
                    <button key={i} className={cls} onClick={()=>handleSelect(i)}>
                      <span className="ch-alpha" style={isAnswered&&i===current.answer?{background:"#3DB87A",color:"#fff"}:isAnswered&&i===selected?{background:"#E8572A",color:"#fff"}:{}}>{alpha}</span>
                      <span className="ch-body">{ch}</span>
                      {isAnswered&&i===current.answer&&<span className="ch-result">✓</span>}
                      {isAnswered&&i===selected&&i!==current.answer&&<span className="ch-result" style={{color:"#E8572A"}}>✗</span>}
                    </button>
                  );
                })}
              </div>

              {showExp&&(
                <div className={`exp-card fadeUp ${isCorrect&&!timedOut?"exp-ok":timedOut?"exp-time":"exp-ng"}`}>
                  <div className="exp-header">
                    <span className="exp-verdict">
                      {timedOut?"⏰ 時間切れ":isCorrect?"✓ 正解！":"✗ 不正解"}
                    </span>
                    {timedOut&&<span className="exp-correct-ans">正解：{["A","B","C","D"][current.answer]}</span>}
                  </div>
                  <p className="exp-body">{current.explanation}</p>
                </div>
              )}

              {isAnswered&&(
                <div className="next-wrap fadeUp">
                  <button className="next-btn" onClick={handleNext}>
                    {idx+1>=deck.length?"結果を見る":"次の問題"}
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                    </svg>
                  </button>
                </div>
              )}
            </div>
          )}

          {screen==="result"&&(
            <div className="page fadeUp">
              <div className="result-top">
                <p className="result-eyebrow">修行完了</p>
                <div className="result-score-wrap">
                  <svg width="140" height="140" viewBox="0 0 140 140">
                    <circle cx="70" cy="70" r="58" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="10"/>
                    <circle cx="70" cy="70" r="58" fill="none" stroke={scoreColor(sessRate)} strokeWidth="10"
                      strokeLinecap="round" strokeDasharray={`${sessRate*3.644} 364.4`}
                      transform="rotate(-90 70 70)" style={{transition:"stroke-dasharray 1s ease .3s"}}/>
                  </svg>
                  <div className="result-score-inner">
                    <span className="result-pct" style={{color:scoreColor(sessRate)}}>{sessRate}<small>%</small></span>
                    <span className="result-sub">{sessCorrect}/{sessionAns.length}</span>
                  </div>
                </div>
                <div className="result-verdict" style={{color:scoreColor(sessRate),borderColor:scoreColor(sessRate)+"44",background:scoreColor(sessRate)+"11"}}>
                  {sessRate>=80?"🏆 優秀！":sessRate>=60?"✅ 合格ライン達成！":"📚 もう一度復習しよう"}
                </div>
                <div className="result-cats">
                  {Object.keys(CAT_META).map(cat=>{
                    const qs=sessionAns.filter(a=>a.q.category===cat);
                    if(!qs.length) return null;
                    const r=Math.round(qs.filter(a=>a.correct).length/qs.length*100);
                    return(
                      <div key={cat} className="rc-row">
                        <span className="rc-icon">{CAT_META[cat].icon}</span>
                        <span className="rc-name">{cat}</span>
                        <div className="rc-track"><div className="rc-fill" style={{width:`${r}%`,background:CAT_META[cat].color}}/></div>
                        <span className="rc-pct" style={{color:scoreColor(r)}}>{r}%</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              <p className="section-hd">問題別レビュー</p>
              <div className="ans-log">
                {sessionAns.map((a,i)=>(
                  <div key={i} className={`ans-row ${a.correct?"ar-ok":"ar-ng"}`}>
                    <span className="ar-n">Q{i+1}</span>
                    <span className="ar-cat" style={{color:CAT_META[a.q.category]?.color}}>{CAT_META[a.q.category]?.icon}</span>
                    <span className="ar-q">{a.q.question.slice(0,28)}…</span>
                    <span className="ar-mark">{a.correct?"✓":"✗"}</span>
                    {!a.correct&&<span className="ar-cnt">×{(ud.wrongCounts||{})[a.q.id]||0}</span>}
                  </div>
                ))}
              </div>

              <button className="cta-btn" onClick={()=>startQuiz()}>もう一度</button>
              <button className="ghost-btn" onClick={()=>startQuiz("WEAK")}>弱点だけ特訓</button>
              <button className="ghost-btn" onClick={()=>setScreen("home")}>ホームへ戻る</button>
            </div>
          )}

          {screen==="notebook"&&(
            <div className="page fadeUp">
              <div className="nb-nav">
                <button className="nav-back" onClick={()=>setScreen("home")}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <h2 className="nb-title">間違いノート</h2>
                <span className="nb-count">{weakQs.length}問</span>
              </div>

              {weakQs.length===0?(
                <div className="empty-wrap">
                  <div className="empty-icon">🎉</div>
                  <p className="empty-msg">まだ間違えた問題はありません</p>
                  <p className="empty-sub">どんどん問題に挑戦しよう！</p>
                </div>
              ):(
                <div className="nb-list">
                  {weakQs.map(q=>{
                    const wc=(ud.wrongCounts||{})[q.id]||0;
                    const isStar=(ud.starIds||[]).includes(q.id);
                    return(
                      <div key={q.id} className="nb-card">
                        <div className="nb-card-top">
                          <span className="nb-cat" style={{color:CAT_META[q.category]?.color,background:CAT_META[q.category]?.bg,borderColor:CAT_META[q.category]?.color+"44"}}>
                            {CAT_META[q.category]?.icon} {q.category}
                          </span>
                          <div className="nb-actions">
                            <span className="nb-wc" style={{color:wc>=3?"#E8572A":"#E8A020"}}>
                              ✗ {wc}回
                            </span>
                            <button className={`nb-star ${isStar?"on":""}`} onClick={()=>toggleStar(q.id)}>{isStar?"★":"☆"}</button>
                            <button className="nb-resolve" onClick={()=>clearWrong(q.id)}>解決</button>
                          </div>
                        </div>
                        <p className="nb-q">{q.question}</p>
                        <div className="nb-ans-box">
                          <span className="nb-ans-lbl">正解</span>
                          <span className="nb-ans-val">{["A","B","C","D"][q.answer]}. {q.choices[q.answer]}</span>
                        </div>
                        <details className="nb-details">
                          <summary className="nb-summary">解説を見る ▾</summary>
                          <p className="nb-exp">{q.explanation}</p>
                        </details>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
