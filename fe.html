<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基本情報技術者（科目A） 無料問題集 | 資格Pass</title>
<meta name="description" content="基本情報技術者（科目A/午前）の無料4択問題集。スマホ対応・解説付き。参考書・通信講座情報も掲載。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2744;--green:#1D9E75;--green-d:#0F6E56;--green-bg:#E1F5EE;
  --accent-bg:#FEF0EB;--gold:#D4941A;--gold-bg:#FEF6E4;
  --bg:#f5f4f0;--bg2:#fff;--border:#e5e3dc;--border2:#c8c5bc;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --font-d:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
  --font-b:'Noto Sans JP',sans-serif;
  --radius:14px;--radius-sm:10px;--tap:52px;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:var(--font-b);color:var(--text);line-height:1.6;}
a{text-decoration:none;color:inherit;}

/* Header */
.site-header{background:var(--navy);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.site-logo{color:#fff;font-size:17px;font-weight:700;}.site-logo span{color:#1D9E75;}
.site-back{color:rgba(255,255,255,0.7);font-size:13px;display:flex;align-items:center;gap:5px;}

/* Main Layout */
.app-container{max-width:600px;margin:0 auto;padding:20px 16px;}

/* Quiz Section */
.quiz-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:24px;margin-bottom:20px;}
.choice-btn{width:100%;padding:14px 18px;margin-bottom:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:left;font-size:15px;cursor:pointer;}
.choice-btn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-d);font-weight:700;}
.choice-btn.wrong{background:var(--accent-bg);border-color:#fb9a7c;color:#e65b3c;font-weight:700;}

/* Info Section (The Bottom Part) */
.aff-section{background:#f5f4f0;padding:24px 0;margin-top:40px;}
.aff-inner{max-width:600px;margin:0 auto;padding:0 20px;}
.aff-h2{font-size:16px;font-weight:700;margin-bottom:16px;}
.book-card{background:#fff;border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:10px;}
.course-card{display:flex;align-items:center;gap:12px;background:#fff;padding:12px;border-radius:11px;margin-bottom:10px;border:1px solid var(--border);}
.official-btn{display:flex;align-items:center;gap:12px;background:var(--navy);color:#fff;border-radius:12px;padding:14px;margin-bottom:20px;}

/* SEO / FAQ Section */
.seo-section{background:#fff;padding:40px 20px;}
.seo-h3{font-size:15px;font-weight:700;margin:24px 0 10px;border-left:3px solid var(--green);padding-left:9px;}
.faq-item{background:#f9f8f5;border:1px solid var(--border);border-radius:9px;margin-bottom:10px;padding:12px;font-size:13px;font-weight:700;}

/* Footer */
.site-footer{background:var(--navy);padding:30px 20px;text-align:center;color:rgba(255,255,255,0.4);font-size:11px;}
.site-footer-links{display:flex;justify-content:center;gap:15px;margin-bottom:10px;}
</style>
</head>
<body>

<header class="site-header">
  <a class="site-logo" href="index.html">資格<span>Pass</span></a>
  <a class="site-back" href="index.html">一覧へ</a>
</header>

<div class="app-container">
  <div id="quiz-view">
    <div id="quiz-progress" style="font-size:13px;color:var(--text3);margin-bottom:8px;">Q.1 / 10</div>
    <div class="quiz-card">
      <div id="question" style="font-size:17px;font-weight:700;margin-bottom:20px;">読み込み中...</div>
      <div id="choices" class="choice-list"></div>
      <div id="explanation" style="margin-top:20px;padding:15px;background:var(--gold-bg);border-radius:10px;display:none;">
        <div style="font-weight:700;color:var(--gold);margin-bottom:5px;">💡 解説</div>
        <div id="expl-text" style="font-size:14px;"></div>
      </div>
    </div>
    <button id="next-btn" style="width:100%;padding:15px;background:var(--navy);color:#fff;border:none;border-radius:26px;font-weight:700;display:none;" onclick="goNext()">次の問題へ</button>
  </div>
</div>

<section class="aff-section">
  <div class="aff-inner">
    <h2 class="aff-h2">試験対策・学習情報</h2>
    <a class="official-btn" href="https://www.ipa.go.jp/shiken/kubun/fe.html" target="_blank">
      <div>🏛️</div><div>IPA公式サイトで詳細を確認</div>
    </a>
    
    <h3 style="font-size:14px;margin-bottom:10px;">おすすめ参考書</h3>
    <div class="book-card"><div>📖 キタミ式イラストIT塾 基本情報技術者</div></div>
    <div class="book-card"><div>📖 基本情報技術者 パーフェクトラーニング</div></div>

    <h3 style="font-size:14px;margin:20px 0 10px;">おすすめ通信講座</h3>
    <a class="course-card" href="#"><div>🎓 スタディング</div></a>
    <a class="course-card" href="#"><div>🎓 資格の大原</div></a>
  </div>
</section>

<section class="seo-section">
  <div class="aff-inner">
    <h2 style="font-size:16px;margin-bottom:15px;">よくある質問</h2>
    <div class="faq-item">Q. 文系でも合格できますか？<br><span style="font-weight:normal;color:#666;">A. はい、論理的思考の練習で合格可能です。</span></div>
    <div class="faq-item">Q. 勉強時間はどのくらい？<br><span style="font-weight:normal;color:#666;">A. 初学者の場合、200〜300時間程度が目安です。</span></div>
  </div>
</section>

<footer class="site-footer">
  <div class="site-footer-links">
    <a href="#">プライバシーポリシー</a>
    <a href="#">お問い合わせ</a>
  </div>
  <p>© 2025 資格Pass</p>
</footer>

<script>
const questions = [
  // JSONデータ（ここに問題を追加してください）
  { "id":1, "category":"アルゴリズム", "question":"最も計算量が小さいアルゴリズムはどれか。", "choices":["O(n log n)","O(n^2)","O(log n)","O(n)"], "answer":2, "explanation":"O(log n)が最も小さい。" },
  { "id":2, "category":"アルゴリズム", "question":"二重ループの計算量は？", "choices":["O(n)","O(n log n)","O(n^2)","O(2^n)"], "answer":2, "explanation":"n × n で O(n^2) となります。" }
  // ... 以下、180問まで追加可能
];

let currentIndex = 0;
let isAnswered = false;

function loadQuestion() {
  isAnswered = false;
  const q = questions[currentIndex];
  document.getElementById('question').textContent = q.question;
  document.getElementById('quiz-progress').textContent = `Q.${currentIndex + 1} / ${questions.length}`;
  
  const cEl = document.getElementById('choices');
  cEl.innerHTML = '';
  q.choices.forEach((txt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = txt;
    btn.onclick = () => selectChoice(idx, btn);
    cEl.appendChild(btn);
  });
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
}

function selectChoice(idx, btn) {
  if (isAnswered) return;
  isAnswered = true;
  const correct = questions[currentIndex].answer;
  const buttons = document.getElementsByClassName('choice-btn');
  if (idx === correct) btn.classList.add('correct');
  else {
    btn.classList.add('wrong');
    buttons[correct].classList.add('correct');
  }
  document.getElementById('expl-text').textContent = questions[currentIndex].explanation;
  document.getElementById('explanation').style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function goNext() {
  currentIndex++;
  if (currentIndex < questions.length) loadQuestion();
  else alert('全問終了です！');
}

loadQuestion();
</script>
</body>
</html>
