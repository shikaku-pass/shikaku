<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本情報技術者（科目A） 無料問題集・過去問対策 | 資格Pass</title>
    <meta name="description" content="基本情報技術者（科目A）の無料問題集。スマホ対応、解説付き。全問、弱点特訓、登録問題など多機能な学習モードを搭載。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #1a2744;
            --accent-orange: #ff5722;
            --accent-orange-dark: #e64a19;
            --success-green: #1D9E75;
            --success-green-bg: #E1F5EE;
            --bg-gray: #f5f4f0;
            --card-white: #ffffff;
            --border-color: #e5e3dc;
            --text-main: #1a1a1a;
            --text-sub: #555555;
            --text-light: #999999;
            --font-zen: 'Zen Kaku Gothic New', sans-serif;
            --radius-main: 14px;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-gray); font-family: 'Noto Sans JP', sans-serif; color: var(--text-main); line-height: 1.6; }

        /* --- DASHBOARD HEADER --- */
        .dashboard-header { background: var(--primary-navy); color: #fff; padding: 40px 20px 60px; position: relative; }
        .header-content { max-width: 900px; margin: 0 auto; position: relative; }
        .course-label { font-size: 11px; font-weight: 900; color: var(--success-green); letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .course-title { font-family: var(--font-zen); font-size: 32px; font-weight: 900; margin-bottom: 30px; letter-spacing: -0.5px; }
        
        .main-stats { display: flex; gap: 40px; align-items: baseline; }
        .stat-group { display: flex; flex-direction: column; }
        .stat-number { font-size: 36px; font-weight: 900; line-height: 1; color: #fff; margin-bottom: 4px; }
        .stat-number.green { color: var(--success-green); }
        .stat-label { font-size: 12px; font-weight: 700; opacity: 0.7; }

        .entry-badge { position: absolute; right: 0; top: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 12px 18px; border-radius: 12px; text-align: center; }
        .entry-badge .val { display: block; font-size: 18px; font-weight: 900; }
        .entry-badge .lbl { font-size: 10px; opacity: 0.6; }

        /* --- LAYOUT GRID --- */
        .dashboard-container { max-width: 900px; margin: -30px auto 60px; padding: 0 16px; display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; }

        /* --- COMMON CARDS --- */
        .card { background: var(--card-white); border-radius: var(--radius-main); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); }
        .card-header { font-size: 12px; font-weight: 900; color: var(--text-light); margin-bottom: 20px; letter-spacing: 0.5px; }

        /* --- MODE SELECTOR --- */
        .mode-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .mode-option { border: 2px solid var(--border-color); border-radius: 12px; padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .mode-option.active { border-color: var(--accent-orange); background: #fff; }
        .mode-icon { font-size: 28px; display: block; margin-bottom: 8px; }
        .mode-name { font-size: 13px; font-weight: 900; display: block; margin-bottom: 4px; }
        .mode-count { font-size: 11px; color: var(--text-light); }

        /* --- CATEGORY SELECTOR --- */
        .category-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background: #fff; border: 1px solid var(--border-color); padding: 8px 18px; border-radius: 30px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .tag.active { background: var(--primary-navy); color: #fff; border-color: var(--primary-navy); }

        /* --- ACTION BUTTON --- */
        .btn-start { width: 100%; background: var(--accent-orange); color: #fff; border: none; padding: 22px; border-radius: 16px; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--accent-orange-dark); transition: 0.1s; margin-top: 10px; }
        .btn-start:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--accent-orange-dark); }
        .reset-data { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-light); text-decoration: underline; cursor: pointer; display: block; }

        /* --- SIDE STATS --- */
        .side-stat-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .side-stat-row:last-child { border-bottom: none; }
        .side-stat-label { font-weight: 500; color: var(--text-sub); }
        .side-stat-value { font-weight: 900; font-size: 16px; }
        .side-stat-value.green { color: var(--success-green); }
        .side-stat-value.orange { color: var(--accent-orange); }

        .wrong-note-card { text-align: center; padding: 30px 0; }
        .wrong-count { font-size: 42px; font-weight: 900; color: var(--border-color); line-height: 1; }
        .wrong-label { font-size: 11px; color: var(--text-light); margin-top: 8px; font-weight: 700; }

        /* --- INFO SECTION (FOOTER) --- */
        .info-section { grid-column: 1 / -1; margin-top: 40px; }
        .section-ttl { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 24px; }
        .info-link-card { background: #fff; border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 12px; text-decoration: none; color: inherit; }
        .info-link-card.dark { background: var(--primary-navy); color: #fff; border: none; }
        .info-icon-box { font-size: 32px; width: 40px; text-align: center; }
        .info-text-box .title { font-size: 15px; font-weight: 900; margin-bottom: 2px; }
        .info-text-box .desc { font-size: 11px; opacity: 0.7; }

        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .entry-badge { position: static; margin-bottom: 20px; display: inline-block; }
            .main-stats { gap: 25px; }
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <header class="dashboard-header">
            <div class="header-content">
                <span class="course-label">FE 科目A試験</span>
                <h1 class="course-title">基本情報技術者</h1>
                
                <div class="main-stats">
                    <div class="stat-group">
                        <span class="stat-number green" id="header-rate">0%</span>
                        <span class="stat-label">正答率</span>
                    </div>
                    <div class="stat-group">
                        <span class="stat-number" id="header-count">0</span>
                        <span class="stat-label">解答数</span>
                    </div>
                </div>

                <div class="entry-badge">
                    <span class="val">入門</span>
                    <span class="lbl">GRADE</span>
                </div>
            </div>
        </header>

        <div class="dashboard-container">
            <div class="dash-left">
                <div class="card">
                    <div class="card-header">モード選択</div>
                    <div class="mode-selector">
                        <div class="mode-option active" onclick="selectMode(this)">
                            <span class="mode-icon">📚</span>
                            <span class="mode-name">全問</span>
                            <span class="mode-count">80問</span>
                        </div>
                        <div class="mode-option" onclick="selectMode(this)">
                            <span class="mode-icon">🔥</span>
                            <span class="mode-name">弱点特訓</span>
                            <span class="mode-count">0問</span>
                        </div>
                        <div class="mode-option" onclick="selectMode(this)">
                            <span class="mode-icon">⭐</span>
                            <span class="mode-name">登録問題</span>
                            <span class="mode-count">0問</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">カテゴリ</div>
                    <div class="category-tags">
                        <span class="tag active" onclick="selectTag(this)">全て</span>
                        <span class="tag" onclick="selectTag(this)">テクノロジ</span>
                        <span class="tag" onclick="selectTag(this)">マネジメント</span>
                        <span class="tag" onclick="selectTag(this)">ストラテジ</span>
                    </div>
                </div>

                <button class="btn-start">学習開始 →</button>
                <span class="reset-data" onclick="resetApp()">データをリセット</span>
            </div>

            <div class="dash-right">
                <div class="card">
                    <div class="card-header">学習統計</div>
                    <div class="side-stat-row">
                        <span class="side-stat-label">通算解答数</span>
                        <span class="side-stat-value" id="side-count">0</span>
                    </div>
                    <div class="side-stat-row">
                        <span class="side-stat-label">通算正答率</span>
                        <span class="side-stat-value green" id="side-rate">0%</span>
                    </div>
                    <div class="side-stat-row">
                        <span class="side-stat-label">要復習問題</span>
                        <span class="side-stat-value orange">0問</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">間違いノート</div>
                    <div class="wrong-note-card">
                        <div class="wrong-count">0</div>
                        <div class="wrong-label">直近の間違い</div>
                    </div>
                </div>
            </div>

            <div class="info-section">
                <h2 class="section-ttl">試験に申し込む・学習を深める</h2>
                
                <a href="https://www.ipa.go.jp/shiken/kubun/fe.html" target="_blank" class="info-link-card dark">
                    <div class="info-icon-box">🏛️</div>
                    <div class="info-text-box">
                        <div class="title">IPA 公式サイト</div>
                        <div class="desc">最新の試験日程・申込方法を確認</div>
                    </div>
                </a>

                <div class="info-link-card">
                    <div class="info-icon-box">📖</div>
                    <div class="info-text-box">
                        <div class="title">キタミ式イラストIT塾 基本情報技術者</div>
                        <div class="desc">初学者に最適な図解解説</div>
                    </div>
                </div>

                <div class="info-link-card">
                    <div class="info-icon-box">📖</div>
                    <div class="info-text-box">
                        <div class="title">基本情報技術者 パーフェクトラーニング過去集</div>
                        <div class="desc">圧倒的な問題数と詳細な解説</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 危険物取扱者版のUIロジックをシミュレート
        function selectMode(el) {
            document.querySelectorAll('.mode-option').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
        }

        function selectTag(el) {
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function resetApp() {
            if(confirm('学習データをすべてリセットしますか？')) {
                location.reload();
            }
        }
    </script>
</body>
</html>
