<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>危険物取扱者 乙4 錬成道場 | 資格Pass</title>
<meta name="description" content="危険物取扱者乙種第4類の無料問題集。全15問・弱点特訓・スター登録機能つき。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E0E12;--ink2:#161620;--ink3:#1E1E2A;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);
  --red:#E8572A;--gold:#E8A020;--green:#3DB87A;--blue:#4A9EE8;
  --text:#ECEAF4;--text2:#A09EB8;--text3:#5A5870;
  --font-d:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
  --font-b:'Noto Sans JP',sans-serif;
  --radius:16px;--radius-sm:10px;--tap:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ink);font-family:var(--font-b);min-height:100vh;}

.root{
  min-height:100vh;
  background:
    radial-gradient(ellipse 80% 40% at 15% 0%,rgba(232,87,42,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 100%,rgba(74,158,232,0.06) 0%,transparent 60%),
    var(--ink);
  color:var(--text);
  display:flex;justify-content:center;
}
.page{width:100%;max-width:430px;padding:0 16px 80px;display:flex;flex-direction:column;gap:14px;}
.quiz-page{gap:11px;}
.hidden{display:none!important;}

.fadeUp{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slideIn{animation:slideIn .3s cubic-bezier(.16,1,.3,1) both;}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* HOME */
.home-shell{width:100%;max-width:430px;min-height:100vh;padding:0 18px;display:flex;flex-direction:column;}
.home-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.home-logo{display:flex;align-items:center;gap:8px;}
.home-brand{font-family:var(--font-d);font-size:17px;font-weight:900;letter-spacing:2px;}
.home-nb-btn{position:relative;width:40px;height:40px;border-radius:var(--radius-sm);background:var(--ink3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s;}
.home-nb-btn:hover{border-color:var(--border2);}
.home-nb-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 0 2px var(--ink);}
.home-hero{display:flex;align-items:center;gap:14px;padding:18px 0 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.home-hero-left{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.home-exam-type{font-size:10px;color:var(--red);font-weight:700;letter-spacing:2.5px;}
.home-exam-name{font-family:var(--font-d);font-size:22px;font-weight:900;letter-spacing:.5px;line-height:1.1;}
.home-stats-row{display:flex;align-items:center;gap:0;margin-top:2px;}
.home-stat{display:flex;flex-direction:column;align-items:center;padding:0 12px 0 0;}
.hs-num{font-family:var(--font-d);font-size:18px;font-weight:900;line-height:1;}
.hs-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.home-stat-div{width:1px;height:28px;background:var(--border);margin-right:12px;}
.home-rank{display:flex;flex-direction:column;align-items:center;gap:4px;border:1.5px solid;border-radius:14px;padding:10px 14px;flex-shrink:0;min-width:58px;}
.home-rank-k{font-family:var(--font-d);font-size:26px;font-weight:900;line-height:1;}
.home-rank-l{font-size:10px;font-weight:700;letter-spacing:1px;}
.home-rank-bar{width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:2px;}
.home-rank-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.home-bottom{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:10px;padding:16px 0 28px;}
.home-modes{display:flex;gap:7px;}
.hm-btn{flex:1;background:var(--ink3);border:1.5px solid var(--border);border-radius:12px;padding:10px 4px;cursor:pointer;font-family:var(--font-b);display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);transition:all .18s;min-height:72px;}
.hm-btn:hover:not(.hm-off){background:rgba(255,255,255,0.06);border-color:var(--border2);}
.hm-active{background:rgba(232,87,42,0.1)!important;border-color:rgba(232,87,42,0.5)!important;color:var(--red)!important;}
.hm-off{opacity:.35;cursor:not-allowed;}
.hm-icon{font-size:18px;line-height:1;}
.hm-label{font-size:12px;font-weight:700;}
.hm-count{font-size:10px;color:var(--text3);}
.hm-active .hm-count{color:rgba(232,87,42,0.7);}
.home-cats{display:flex;gap:6px;flex-wrap:wrap;transition:opacity .2s,max-height .3s;}
.home-cats-hidden{opacity:0;pointer-events:none;max-height:0!important;overflow:hidden;margin:0;}
.hc-chip{background:var(--ink3);border:1px solid var(--border);border-radius:16px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font-b);transition:all .18s;}
.hc-active{border-color:var(--border2)!important;color:var(--text)!important;background:rgba(255,255,255,0.09)!important;}
.home-opts{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ho-timer{display:flex;align-items:center;gap:5px;}
.ho-label{font-size:12px;color:var(--text3);margin-right:2px;}
.ho-pill{background:var(--ink3);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font-b);transition:all .18s;}
.ho-on{background:rgba(74,158,232,0.12)!important;border-color:var(--blue)!important;color:var(--blue)!important;}
.ho-shuffle.ho-on{background:rgba(61,184,122,0.1)!important;border-color:rgba(61,184,122,0.4)!important;color:var(--green)!important;}
.home-start{background:linear-gradient(135deg,#E8572A 0%,#C43A10 100%);color:#fff;border:none;border-radius:var(--radius);width:100%;height:56px;font-size:18px;font-weight:900;cursor:pointer;font-family:var(--font-d);letter-spacing:2px;box-shadow:0 4px 24px rgba(232,87,42,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.home-start:hover{transform:translateY(-1px);box-shadow:0 6px 32px rgba(232,87,42,.5);}
.home-start-off{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.ghost-btn{background:transparent;border:1.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;width:100%;height:var(--tap);font-size:15px;font-family:var(--font-b);transition:all .2s;}
.ghost-btn:hover{background:rgba(255,255,255,0.04);}
.text-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--font-b);text-decoration:underline;align-self:center;padding:4px;}
.section-hd{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:4px 0 0;}

/* QUIZ */
.quiz-nav{display:flex;align-items:center;justify-content:space-between;padding-top:16px;}
.nav-back{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--ink3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nav-back:hover{border-color:var(--border2);}
.quiz-counter{display:flex;align-items:baseline;gap:3px;}
.qc-cur{font-family:var(--font-d);font-size:28px;font-weight:900;color:var(--text);}
.qc-sep{font-size:14px;color:var(--text3);}
.qc-tot{font-size:16px;color:var(--text3);}
.star-nav-btn{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--ink3);border:1px solid var(--border);font-size:22px;cursor:pointer;color:var(--text3);transition:all .2s;line-height:1;}
.star-nav-btn.on{color:var(--gold);border-color:rgba(232,160,32,0.4);background:rgba(232,160,32,0.1);}
.q-progress{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;}
.q-prog-fill{height:100%;background:linear-gradient(90deg,var(--red),#F97316);border-radius:2px;transition:width .4s ease;}
.timer-wrap{position:relative;width:48px;height:48px;align-self:center;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;font-weight:900;transition:color .3s;}
.session-bar{display:flex;align-items:center;gap:8px;}
.sb-correct{font-size:12px;font-weight:700;color:var(--green);min-width:32px;}
.sb-wrong{font-size:12px;font-weight:700;color:var(--red);min-width:32px;text-align:right;}
.sb-dots{flex:1;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.sb-dot{width:8px;height:8px;border-radius:50%;}
.sd-ok{background:var(--green);}
.sd-ng{background:var(--red);}
.sd-cur{background:var(--gold);width:10px;height:10px;}
.sd-future{background:rgba(255,255,255,0.12);}
.sb-more{font-size:10px;color:var(--text3);}
.q-card{background:var(--ink3);border:1px solid var(--border);border-radius:20px;padding:18px 18px 20px;}
.q-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.q-cat-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;letter-spacing:.5px;}
.q-miss-badge{font-size:11px;font-weight:700;color:var(--red);background:rgba(232,87,42,0.12);border:1px solid rgba(232,87,42,0.25);padding:4px 10px;border-radius:7px;}
.q-text{font-size:16px;line-height:1.85;color:var(--text);font-weight:500;}
.choices-wrap{display:flex;flex-direction:column;gap:9px;}
.choice-btn{background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:14px;padding:0 14px;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;gap:12px;text-align:left;transition:background .15s,border-color .15s,transform .15s;color:var(--text2);min-height:var(--tap);width:100%;}
.choice-btn:not(.ch-correct):not(.ch-wrong):not(.ch-faded):hover{background:rgba(255,255,255,0.08);border-color:var(--border2);transform:translateX(3px);}
.ch-correct{background:rgba(61,184,122,.15)!important;border-color:#3DB87A!important;color:#6EE7B7!important;}
.ch-wrong{background:rgba(232,87,42,.15)!important;border-color:var(--red)!important;color:#FCA5A5!important;}
.ch-faded{opacity:.35;}
.ch-alpha{font-family:var(--font-d);font-weight:900;font-size:13px;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s;}
.ch-body{flex:1;font-size:14px;line-height:1.6;padding:13px 0;}
.ch-result{font-size:18px;font-weight:700;color:var(--green);}
.exp-card{border-radius:14px;padding:16px;border:1px solid;}
.exp-ok{background:rgba(61,184,122,.08);border-color:rgba(61,184,122,.3);}
.exp-ng{background:rgba(232,87,42,.08);border-color:rgba(232,87,42,.3);}
.exp-time{background:rgba(232,160,32,.08);border-color:rgba(232,160,32,.3);}
.exp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.exp-verdict{font-size:14px;font-weight:700;}
.exp-ok .exp-verdict{color:var(--green);}
.exp-ng .exp-verdict{color:var(--red);}
.exp-time .exp-verdict{color:var(--gold);}
.exp-correct-ans{font-size:12px;color:var(--gold);}
.exp-body{font-size:13px;line-height:1.9;color:var(--text2);}
.next-wrap{position:sticky;bottom:20px;background:linear-gradient(to top,var(--ink) 60%,transparent);padding-top:12px;}
.next-btn{background:linear-gradient(135deg,#E8572A 0%,#C43A10 100%);color:#fff;border:none;border-radius:var(--radius);width:100%;height:var(--tap);font-size:17px;font-weight:700;cursor:pointer;font-family:var(--font-d);letter-spacing:1px;box-shadow:0 4px 20px rgba(232,87,42,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.next-btn:hover{transform:translateY(-1px);}
.cta-btn{background:linear-gradient(135deg,#E8572A 0%,#C43A10 100%);color:#fff;border:none;border-radius:var(--radius);width:100%;height:var(--tap);font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-d);letter-spacing:1px;box-shadow:0 4px 20px rgba(232,87,42,.4);transition:all .2s;}
.cta-btn:hover{transform:translateY(-1px);}

/* RESULT */
.result-top{display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:20px;}
.result-eyebrow{font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;}
.result-score-wrap{position:relative;width:140px;height:140px;}
.result-score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-pct{font-family:var(--font-d);font-size:42px;font-weight:900;line-height:1;}
.result-pct small{font-size:18px;}
.result-sub{font-size:12px;color:var(--text3);margin-top:3px;}
.result-verdict{font-size:15px;font-weight:700;padding:10px 24px;border-radius:var(--radius-sm);border:1px solid;}
.result-cats{width:100%;display:flex;flex-direction:column;gap:8px;}
.rc-row{display:flex;align-items:center;gap:8px;}
.rc-icon{font-size:14px;}
.rc-name{font-size:11px;font-weight:700;width:52px;color:var(--text2);}
.rc-track{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.rc-fill{height:100%;border-radius:3px;transition:width 1s ease .5s;}
.rc-pct{font-size:11px;font-weight:700;width:32px;text-align:right;}
.ans-log{display:flex;flex-direction:column;gap:7px;}
.ans-row{display:flex;align-items:center;gap:8px;background:var(--ink3);border-radius:10px;padding:11px 12px;border:1px solid var(--border);border-left:3px solid var(--border);}
.ar-ok{border-left-color:var(--green)!important;}
.ar-ng{border-left-color:var(--red)!important;}
.ar-n{font-size:11px;color:var(--text3);min-width:24px;}
.ar-cat{font-size:14px;}
.ar-q{flex:1;font-size:12px;color:var(--text2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.ar-mark{font-size:16px;font-weight:700;}
.ar-ok .ar-mark{color:var(--green);}
.ar-ng .ar-mark{color:var(--red);}
.ar-cnt{font-size:10px;color:var(--red);background:rgba(232,87,42,0.12);padding:2px 7px;border-radius:5px;}

/* NOTEBOOK */
.nb-nav{display:flex;align-items:center;gap:12px;padding-top:16px;}
.nb-title{font-family:var(--font-d);font-size:20px;font-weight:900;flex:1;letter-spacing:1px;}
.nb-count{font-size:13px;color:var(--text3);}
.nb-list{display:flex;flex-direction:column;gap:12px;}
.nb-card{background:var(--ink3);border:1px solid var(--border);border-radius:18px;padding:16px;transition:border-color .2s;}
.nb-card:hover{border-color:var(--border2);}
.nb-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.nb-cat{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;}
.nb-actions{display:flex;align-items:center;gap:8px;}
.nb-wc{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(232,87,42,0.12);}
.nb-star{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);transition:color .2s;line-height:1;}
.nb-star.on{color:var(--gold);}
.nb-resolve{background:rgba(61,184,122,0.12);border:1px solid rgba(61,184,122,0.3);border-radius:7px;color:var(--green);font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;font-family:var(--font-b);transition:all .2s;}
.nb-q{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:10px;font-weight:500;}
.nb-ans-box{background:rgba(61,184,122,0.07);border-radius:9px;padding:9px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start;}
.nb-ans-lbl{font-size:11px;color:var(--green);font-weight:700;white-space:nowrap;margin-top:1px;}
.nb-ans-val{font-size:13px;color:#6EE7B7;line-height:1.5;}
.nb-details{margin-top:4px;}
.nb-summary{font-size:12px;color:var(--text3);cursor:pointer;list-style:none;padding:4px 0;user-select:none;}
.nb-summary::-webkit-details-marker{display:none;}
.nb-exp{font-size:12px;line-height:1.9;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.empty-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:60px 20px;text-align:center;}
.empty-icon{font-size:48px;}
.empty-msg{font-size:16px;font-weight:700;color:var(--text2);}
.empty-sub{font-size:13px;color:var(--text3);}

/* ── PC 2カラムレイアウト ─────────────────────────────── */
@media (min-width: 769px) {
  /* Root & home: 中央寄せ・少し広げる */
  .root { align-items: flex-start; }
  .home-shell { max-width: 700px; margin: 0 auto; padding: 0 32px; }
  .page { max-width: 960px; margin: 0 auto; padding: 0 32px 80px; }

  /* Quiz outer: 2カラムラッパー */
  .pc-quiz-wrap { display: flex; gap: 28px; max-width: 960px; margin: 0 auto; padding: 24px 32px 80px; box-sizing: border-box; }
  .pc-col-left  { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 11px; }
  .pc-col-right { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; position: sticky; top: 20px; align-self: flex-start; }

  /* 右カラム: 解説パネル */
  .pc-exp-panel { background: var(--ink3); border: 1px solid var(--border); border-radius: 20px; padding: 20px; min-height: 200px; display: flex; flex-direction: column; gap: 10px; }
  .pc-panel-title { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .pc-exp-inner { font-size: 13px; line-height: 1.9; color: var(--text2); flex: 1; }
  .pc-exp-verdict { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .pc-placeholder { font-size: 13px; color: var(--text3); text-align: center; padding: 24px 0; margin: auto 0; }

  /* 右カラム: 統計パネル */
  .pc-stats-panel { background: var(--ink3); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .pc-stat-row { display: flex; align-items: center; justify-content: space-between; }
  .pc-stat-lbl { font-size: 13px; color: var(--text2); }
  .pc-stat-val { font-size: 17px; font-weight: 700; font-family: var(--font-d); }
  .pc-divider { height: 1px; background: var(--border); }
  .pc-cat-row { display: flex; align-items: center; gap: 8px; }
  .pc-cat-icon { font-size: 13px; width: 18px; }
  .pc-cat-name { font-size: 11px; color: var(--text2); width: 56px; font-weight: 700; }
  .pc-cat-track { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .pc-cat-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .pc-cat-pct { font-size: 11px; font-weight: 700; width: 28px; text-align: right; }

  /* next-btnをPC幅に合わせる */
  .next-wrap { position: static; background: transparent; padding-top: 0; }
  .next-btn { max-width: 100%; }
  .quiz-nav { padding-top: 0; }
}
@media (max-width: 768px) {
  .pc-quiz-wrap { display: contents; }
  .pc-col-left, .pc-col-right { display: contents; }
  .pc-exp-panel, .pc-stats-panel { display: none; }
}

@media (min-width: 769px) { .exp-mobile { display: none; } }
</style>
</head>
<body>
<div class="root">
  <div id="app"></div>
</div>

<script>
const ALL_QUESTIONS = [
  {id:1,category:"法令",question:"危険物取扱者免状の種類として、正しいものはどれか。",choices:["甲種・乙種・丙種の3種類","甲種・乙種の2種類","甲種・乙種・丙種・丁種の4種類","乙種・丙種の2種類"],answer:0,explanation:"危険物取扱者免状は「甲種」「乙種（第1〜6類）」「丙種」の3種類です。甲種はすべての危険物、乙種は取得した類のみ、丙種はガソリン等の指定品目のみ取り扱えます。"},
  {id:2,category:"物理化学",question:"ガソリンの引火点として、最も近いものはどれか。",choices:["約 −40℃以下","約 0℃","約 21℃","約 70℃"],answer:0,explanation:"ガソリンの引火点は −40℃以下と非常に低く、常温でも引火の危険があります。第4類の中でも特に危険性が高い理由の一つです。"},
  {id:3,category:"性質消火",question:"第4類危険物（引火性液体）の共通する性質として、誤っているものはどれか。",choices:["引火性の液体である","蒸気は空気より重い","すべて水より軽い","電気の不良導体が多い"],answer:2,explanation:"第4類危険物のほとんどは水より軽いですが、二硫化炭素（比重1.26）やクロロベンゼンなど水より重いものも存在します。「すべて水より軽い」は誤りです。"},
  {id:4,category:"法令",question:"製造所等の設置許可の申請先として、正しいものはどれか。",choices:["消防庁長官","都道府県知事または市町村長","経済産業大臣","国土交通大臣"],answer:1,explanation:"危険物施設を設置する場合は、その場所を管轄する市町村長等（市町村長または都道府県知事）に許可申請を行います。"},
  {id:5,category:"物理化学",question:"燃焼の三要素として、正しい組み合わせはどれか。",choices:["可燃物・酸素・点火源（熱）","可燃物・水素・点火源（熱）","可燃物・酸素・二酸化炭素","可燃物・窒素・点火源（熱）"],answer:0,explanation:"燃焼には「可燃物」「酸素供給源」「点火源（熱）」の三要素が必要です。消火はこのいずれかを除去します。"},
  {id:6,category:"性質消火",question:"灯油の特性として、正しいものはどれか。",choices:["引火点は10℃以下","ガソリンより引火点が高い","水に溶けやすい","燃焼範囲はガソリンより広い"],answer:1,explanation:"灯油の引火点は40℃以上で、ガソリン（−40℃以下）よりはるかに高いです。灯油は非水溶性で水には溶けません。"},
  {id:7,category:"法令",question:"危険物の運搬容器に表示しなければならない事項として、誤っているものはどれか。",choices:["危険物の品名","危険物の数量","取扱者の氏名","注意事項"],answer:2,explanation:"運搬容器への表示義務事項は品名・危険等級・化学名・数量・注意事項などです。取扱者の氏名は含まれません。"},
  {id:8,category:"物理化学",question:"静電気による引火を防止するための措置として、最も適切でないものはどれか。",choices:["接地（アース）を行う","空気を乾燥させる","導電性の高い素材を使用する","流速を遅くする"],answer:1,explanation:"静電気は乾燥した環境で発生しやすくなります。「空気を乾燥させる」は静電気を増加させるため防止策として誤りです。"},
  {id:9,category:"性質消火",question:"第4類危険物の火災に対して、適応する消火剤として誤っているものはどれか。",choices:["泡消火剤","二酸化炭素消火剤","ハロゲン化物消火剤","棒状の水"],answer:3,explanation:"第4類危険物の火災に棒状の水を使用すると、燃えている液体が飛散して拡大します。適応は泡・CO₂・粉末・ハロゲン化物です。"},
  {id:10,category:"法令",question:"セルフ式給油取扱所で顧客が自ら給油できる根拠として正しいものはどれか。",choices:["甲種危険物取扱者が常駐しているから","消防法の特例により認められているから","第4類は危険物に該当しないから","給油取扱所は規制対象外だから"],answer:1,explanation:"セルフ式給油取扱所では消防法の特例により顧客による給油が認められています。容器への詰め替えは有資格者が必要です。"},
  {id:11,category:"物理化学",question:"引火点と発火点の説明として正しいものはどれか。",choices:["引火点は点火源なしで燃え始める最低温度","発火点は点火源ありで燃え始める最低温度","引火点は点火源ありで引火する最低温度","引火点と発火点は同じ温度を指す"],answer:2,explanation:"引火点は点火源がある状態で可燃性蒸気が引火する最低温度。発火点は点火源なしに自ら発火する最低温度です。"},
  {id:12,category:"法令",question:"危険物保安監督者について誤っているものはどれか。",choices:["甲種または乙種危険物取扱者でなければならない","6ヶ月以上の実務経験が必要","選任・解任は市町村長等に届け出","製造所等の所有者が選任する"],answer:2,explanation:"危険物保安監督者の選任・解任の届け出先は「所轄消防長または消防署長」です。市町村長等ではありません。"},
  {id:13,category:"性質消火",question:"アルコール類の火災消火に関して誤っているものはどれか。",choices:["水に溶けやすい","引火しやすい","通常の泡消火剤で有効に消火できる","蒸気は有害である"],answer:2,explanation:"アルコール類は水溶性のため通常の泡消火剤は消泡してしまい効果がありません。耐アルコール泡消火剤が必要です。"},
  {id:14,category:"物理化学",question:"爆発範囲（燃焼範囲）について正しいものはどれか。",choices:["爆発下限界が低いほど安全","爆発上限界が高いほど危険","爆発範囲が広いほど危険性が高い","灯油はガソリンより爆発範囲が広い"],answer:2,explanation:"爆発範囲が広いほど多くの混合比で爆発が起こりうるため危険性が高くなります。下限界が低いほど少量でも引火しやすいです。"},
  {id:15,category:"法令",question:"危険物取扱者の保安講習受講義務として正しいものはどれか。",choices:["免状取得後は受講不要","3年に1回受講が義務","毎年受講が義務","施設勤務者のみ受講義務"],answer:1,explanation:"危険物取扱者は原則3年に1回、都道府県知事が行う保安講習を受講する義務があります。現に取扱い作業に従事している者が対象です。"},
];

const CAT_META = {
  "法令":   {color:"#E8572A",icon:"⚖️",bg:"rgba(232,87,42,0.12)"},
  "物理化学":{color:"#4A9EE8",icon:"🔬",bg:"rgba(74,158,232,0.12)"},
  "性質消火":{color:"#3DB87A",icon:"🔥",bg:"rgba(61,184,122,0.12)"},
};
const RANK_THRESHOLDS = [
  {min:0,  label:"入門",kanji:"入",color:"#888"},
  {min:10, label:"初段",kanji:"初",color:"#9b7a4a"},
  {min:30, label:"二段",kanji:"二",color:"#7a9b4a"},
  {min:60, label:"三段",kanji:"三",color:"#4a7a9b"},
  {min:100,label:"四段",kanji:"四",color:"#7a4a9b"},
  {min:150,label:"名人",kanji:"名",color:"#E8A020"},
];
const STORAGE_KEY = "dojo_v3";

function getRank(n){return[...RANK_THRESHOLDS].reverse().find(r=>n>=r.min)||RANK_THRESHOLDS[0];}
function getNextRank(n){return RANK_THRESHOLDS.find(r=>r.min>n);}
function scoreColor(p){if(p===null||p===undefined)return"#555";return p>=80?"#3DB87A":p>=60?"#E8A020":"#E8572A";}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch{}return{wrongCounts:{},starIds:[],history:[],totalSessions:0,totalAnswered:0};}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}

// ─── STATE ───────────────────────────────────────────────────
let S = {
  screen:"home",
  ud:loadData(),
  mode:"ALL",
  filterCat:"全て",
  timerSec:0,
  doShuffle:true,
  deck:[],
  idx:0,
  selected:null,
  showExp:false,
  sessionAns:[],
  timeLeft:null,
  timedOut:false,
  timerInterval:null,
};

function setUd(fn){
  S.ud = typeof fn==="function"?fn(S.ud):fn;
  saveData(S.ud);
}

function computed(){
  const ud=S.ud;
  const totalAnswered=ud.totalAnswered||0;
  const rank=getRank(totalAnswered);
  const nextRank=getNextRank(totalAnswered);
  const rankProgress=nextRank?Math.round(((totalAnswered-rank.min)/(nextRank.min-rank.min))*100):100;
  const recentHist=(ud.history||[]).slice(-200);
  const overallRate=recentHist.length>0?Math.round(recentHist.filter(h=>h.correct).length/recentHist.length*100):null;
  const weakQs=ALL_QUESTIONS.filter(q=>(ud.wrongCounts||{})[q.id]>0).sort((a,b)=>((ud.wrongCounts[b.id]||0)-(ud.wrongCounts[a.id]||0)));
  const starQs=ALL_QUESTIONS.filter(q=>(ud.starIds||[]).includes(q.id));
  const current=S.deck[S.idx];
  const isAnswered=S.selected!==null||S.timedOut;
  const isCorrect=S.selected===current?.answer;
  const sessCorrect=S.sessionAns.filter(a=>a.correct).length;
  const sessRate=S.sessionAns.length>0?Math.round(sessCorrect/S.sessionAns.length*100):0;
  const timerPct=S.timerSec>0&&S.timeLeft!==null?Math.round(S.timeLeft/S.timerSec*100):100;
  const timerColor=timerPct>50?"#3DB87A":timerPct>25?"#E8A020":"#E8572A";
  return{totalAnswered,rank,nextRank,rankProgress,overallRate,weakQs,starQs,current,isAnswered,isCorrect,sessCorrect,sessRate,timerPct,timerColor};
}

// ─── TIMER ───────────────────────────────────────────────────
function startTimer(){
  clearInterval(S.timerInterval);
  if(S.timerSec===0||S.selected!==null||S.timedOut)return;
  S.timeLeft=S.timerSec;
  S.timerInterval=setInterval(()=>{
    S.timeLeft--;
    if(S.timeLeft<=0){
      clearInterval(S.timerInterval);
      S.timedOut=true;S.showExp=true;
    }
    render();
  },1000);
}

// ─── ACTIONS ─────────────────────────────────────────────────
function startQuiz(overrideMode){
  clearInterval(S.timerInterval);
  const m=overrideMode||S.mode;
  let pool=[...ALL_QUESTIONS];
  if(m==="WEAK") pool=ALL_QUESTIONS.filter(q=>(S.ud.wrongCounts||{})[q.id]>0);
  else if(m==="STAR") pool=ALL_QUESTIONS.filter(q=>(S.ud.starIds||[]).includes(q.id));
  else if(S.filterCat!=="全て") pool=pool.filter(q=>q.category===S.filterCat);
  if(pool.length===0)return;
  if(overrideMode)S.mode=overrideMode;
  S.deck=S.doShuffle?shuffle(pool):pool;
  S.idx=0;S.selected=null;S.showExp=false;S.sessionAns=[];S.timedOut=false;S.timeLeft=null;
  S.screen="quiz";
  render();
  startTimer();
}

function handleSelect(i){
  if(S.selected!==null||S.timedOut)return;
  clearInterval(S.timerInterval);
  S.selected=i;S.showExp=true;
  const q=S.deck[S.idx];
  const correct=i===q.answer;
  setUd(prev=>({
    ...prev,
    wrongCounts:{...prev.wrongCounts,[q.id]:correct?Math.max(0,(prev.wrongCounts||{})[q.id]||0):((prev.wrongCounts||{})[q.id]||0)+1},
    history:[...(prev.history||[]).slice(-499),{id:q.id,correct,ts:Date.now()}],
    totalAnswered:(prev.totalAnswered||0)+1,
  }));
  render();
}

function handleNext(){
  const q=S.deck[S.idx];
  const correct=S.selected===q.answer;
  S.sessionAns=[...S.sessionAns,{q,correct,selected:S.selected}];
  if(S.idx+1>=S.deck.length){
    setUd(prev=>({...prev,totalSessions:(prev.totalSessions||0)+1}));
    S.screen="result";
    render();
  } else {
    S.idx++;S.selected=null;S.showExp=false;S.timedOut=false;S.timeLeft=null;
    render();
    startTimer();
  }
}

function toggleStar(id){
  setUd(prev=>({...prev,starIds:(prev.starIds||[]).includes(id)?(prev.starIds||[]).filter(s=>s!==id):[...(prev.starIds||[]),id]}));
  render();
}
function clearWrong(id){
  setUd(prev=>{const wc={...prev.wrongCounts};delete wc[id];return{...prev,wrongCounts:wc};});
  render();
}
function resetData(){
  if(confirm("学習データをすべてリセットしますか？")){
    const d={wrongCounts:{},starIds:[],history:[],totalSessions:0,totalAnswered:0};
    saveData(d);S.ud=d;render();
  }
}

// ─── RENDER ──────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML=buildHTML();
}

function svgArrow(){return`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;}
function svgBack(){return`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;}
function svgBook(){return`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>`;}

function buildHTML(){
  const C=computed();
  if(S.screen==="home") return buildHome(C);
  if(S.screen==="quiz") return buildQuiz(C);
  if(S.screen==="result") return buildResult(C);
  if(S.screen==="notebook") return buildNotebook(C);
  return "";
}

function buildHome(C){
  const {totalAnswered,rank,rankProgress,overallRate,weakQs,starQs}=C;
  const modes=[
    {k:"ALL", label:"全問",   icon:"📚",count:ALL_QUESTIONS.length,disabled:false},
    {k:"WEAK",label:"弱点特訓",icon:"🔥",count:weakQs.length,disabled:weakQs.length===0},
    {k:"STAR",label:"★登録",  icon:"⭐",count:starQs.length, disabled:starQs.length===0},
  ];
  const cats=["全て",...Object.keys(CAT_META)];
  const startOff=(S.mode==="WEAK"&&weakQs.length===0)||(S.mode==="STAR"&&starQs.length===0);
  return `
<div class="home-shell fadeUp">
  <header class="home-topbar">
    <div class="home-logo">
      <svg width="22" height="22" viewBox="0 0 36 36">
        <polygon points="18,2 34,30 2,30" fill="none" stroke="#E8572A" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="18" y1="10" x2="18" y2="22" stroke="#E8572A" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="18" cy="26" r="1.5" fill="#E8572A"/>
      </svg>
      <span class="home-brand">錬成道場</span>
    </div>
    <button class="home-nb-btn" onclick="S.screen='notebook';render()">
      ${svgBook()}
      ${weakQs.length>0?'<span class="home-nb-dot"></span>':""}
    </button>
  </header>
  <div class="home-hero">
    <div class="home-hero-left">
      <span class="home-exam-type">乙種第4類</span>
      <span class="home-exam-name">危険物取扱者</span>
      <div class="home-stats-row">
        <div class="home-stat">
          <span class="hs-num" style="color:${scoreColor(overallRate)}">${overallRate!==null?overallRate+"%":"—"}</span>
          <span class="hs-lbl">正答率</span>
        </div>
        <div class="home-stat-div"></div>
        <div class="home-stat">
          <span class="hs-num">${totalAnswered}</span>
          <span class="hs-lbl">解答数</span>
        </div>
        ${weakQs.length>0?`<div class="home-stat-div"></div><div class="home-stat"><span class="hs-num" style="color:#E8572A">${weakQs.length}</span><span class="hs-lbl">要復習</span></div>`:""}
      </div>
    </div>
    <div class="home-rank" style="border-color:${rank.color}55;background:${rank.color}0e">
      <span class="home-rank-k" style="color:${rank.color}">${rank.kanji}</span>
      <span class="home-rank-l" style="color:${rank.color}">${rank.label}</span>
      <div class="home-rank-bar"><div class="home-rank-fill" style="width:${rankProgress}%;background:${rank.color}"></div></div>
    </div>
  </div>
  <div class="home-bottom">
    <div class="home-modes">
      ${modes.map(m=>`
        <button class="hm-btn ${S.mode===m.k?"hm-active":""} ${m.disabled?"hm-off":""}"
          onclick="${m.disabled?"":"S.mode='"+m.k+"';render()"}">
          <span class="hm-icon">${m.icon}</span>
          <span class="hm-label">${m.label}</span>
          <span class="hm-count">${m.count}問</span>
        </button>`).join("")}
    </div>
    <div class="home-cats ${S.mode!=="ALL"?"home-cats-hidden":""}">
      ${cats.map(cat=>{
        const isActive=S.filterCat===cat;
        const meta=CAT_META[cat];
        const style=isActive&&meta?`background:${meta.bg};border-color:${meta.color};color:${meta.color}`:"";
        return `<button class="hc-chip ${isActive?"hc-active":""}" style="${style}"
          onclick="S.filterCat='${cat}';render()">${cat!=="全て"&&meta?meta.icon+" ":""}${cat}</button>`;
      }).join("")}
    </div>
    <div class="home-opts">
      <div class="ho-timer">
        <span class="ho-label">⏱</span>
        ${[0,30,60].map(t=>`<button class="ho-pill ${S.timerSec===t?"ho-on":""}" onclick="S.timerSec=${t};render()">${t===0?"なし":t+"s"}</button>`).join("")}
      </div>
      <button class="ho-pill ho-shuffle ${S.doShuffle?"ho-on":""}" onclick="S.doShuffle=!S.doShuffle;render()">🔀 ${S.doShuffle?"ON":"OFF"}</button>
    </div>
    <button class="home-start ${startOff?"home-start-off":""}" onclick="startQuiz()">
      修行開始 ${svgArrow()}
    </button>
    <button class="text-btn" onclick="resetData()">データをリセット</button>
  </div>
</div>`;
}

function buildQuiz(C){
  const {current,isAnswered,isCorrect,sessCorrect,timerPct,timerColor}=C;
  if(!current) return "";
  const sessWrong=S.sessionAns.filter(a=>!a.correct).length;
  const isStar=(S.ud.starIds||[]).includes(current.id);
  const progPct=Math.round(((S.idx+1)/S.deck.length)*100);
  const alpha=["A","B","C","D"];

  const dotsHTML=()=>{
    let h=S.sessionAns.map(a=>`<div class="sb-dot ${a.correct?"sd-ok":"sd-ng"}"></div>`).join("");
    h+=`<div class="sb-dot sd-cur"></div>`;
    const future=Math.min(3,S.deck.length-S.idx-1);
    for(let i=0;i<future;i++) h+=`<div class="sb-dot sd-future"></div>`;
    const more=S.deck.length-S.idx-future-1;
    if(more>0) h+=`<span class="sb-more">+${more}</span>`;
    return h;
  };

  const choicesHTML=current.choices.map((ch,i)=>{
    let cls="choice-btn";
    let alphaStyle="";
    let resultIcon="";
    if(isAnswered){
      if(i===current.answer){cls+=" ch-correct";alphaStyle="background:#3DB87A;color:#fff";resultIcon=`<span class="ch-result">✓</span>`;}
      else if(i===S.selected){cls+=" ch-wrong";alphaStyle="background:#E8572A;color:#fff";resultIcon=`<span class="ch-result" style="color:#E8572A">✗</span>`;}
      else cls+=" ch-faded";
    }
    return `<button class="${cls}" onclick="handleSelect(${i})">
      <span class="ch-alpha" style="${alphaStyle}">${alpha[i]}</span>
      <span class="ch-body">${ch}</span>
      ${resultIcon}
    </button>`;
  }).join("");

  let expHTML="";
  if(S.showExp){
    const cls=isCorrect&&!S.timedOut?"exp-ok":S.timedOut?"exp-time":"exp-ng";
    const verdict=S.timedOut?"⏰ 時間切れ":isCorrect?"✓ 正解！":"✗ 不正解";
    expHTML=`<div class="exp-card fadeUp ${cls}">
      <div class="exp-header">
        <span class="exp-verdict">${verdict}</span>
        ${S.timedOut?`<span class="exp-correct-ans">正解：${alpha[current.answer]}</span>`:""}
      </div>
      <p class="exp-body">${current.explanation}</p>
    </div>`;
  }

  const timerHTML=S.timerSec>0?`
    <div class="timer-wrap">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="4"/>
        <circle cx="24" cy="24" r="20" fill="none" stroke="${timerColor}" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="${timerPct*1.257} 125.7"
          transform="rotate(-90 24 24)" style="transition:stroke-dasharray .9s linear,stroke .3s"/>
      </svg>
      <span class="timer-num" style="color:${timerColor}">${S.timedOut?"✕":(S.timeLeft||"")}</span>
    </div>`:"";

  const missCount=(S.ud.wrongCounts||{})[current.id]||0;

  return `
<div class="pc-quiz-wrap fadeUp">
<div class="pc-col-left">
<div class="quiz-nav">
    <button class="nav-back" onclick="clearInterval(S.timerInterval);S.screen='home';render()">${svgBack()}</button>
    <div class="quiz-counter">
      <span class="qc-cur">${S.idx+1}</span>
      <span class="qc-sep">/</span>
      <span class="qc-tot">${S.deck.length}</span>
    </div>
    <button class="star-nav-btn ${isStar?"on":""}" onclick="toggleStar(${current.id})">${isStar?"★":"☆"}</button>
  </div>
  <div class="q-progress"><div class="q-prog-fill" style="width:${progPct}%"></div></div>
  ${timerHTML}
  <div class="session-bar">
    <span class="sb-correct">✓ ${sessCorrect}</span>
    <div class="sb-dots">${dotsHTML()}</div>
    <span class="sb-wrong">✗ ${sessWrong}</span>
  </div>
  <div class="q-card slideIn">
    <div class="q-card-header">
      <span class="q-cat-badge" style="background:${CAT_META[current.category]?.bg||"rgba(255,255,255,0.08)"};color:${CAT_META[current.category]?.color||"#aaa"};border-color:${(CAT_META[current.category]?.color||"#aaa")}44">
        ${CAT_META[current.category]?.icon} ${current.category}
      </span>
      ${missCount>0?`<span class="q-miss-badge">⚡ ${missCount}回ミス</span>`:""}
    </div>
    <p class="q-text">${current.question}</p>
  </div>
  <div class="choices-wrap">${choicesHTML}</div>
  <div class="exp-mobile">${expHTML}</div>
</div>
<div class="pc-col-right">
  ${buildPcExpPanel(C)}
  ${buildPcStatsPanel(C)}
</div>
</div>
  ${isAnswered?`<div class="next-wrap fadeUp">
    <button class="next-btn" onclick="handleNext()">
      ${S.idx+1>=S.deck.length?"結果を見る":"次の問題"} ${svgArrow()}
    </button>
  </div>`:""}
</div>`;
}

function buildResult(C){
  const {sessCorrect,sessRate}=C;
  const verdict=sessRate>=80?"🏆 優秀！":sessRate>=60?"✅ 合格ライン達成！":"📚 もう一度復習しよう";
  const dashArr=`${sessRate*3.644} 364.4`;

  const catRows=Object.keys(CAT_META).map(cat=>{
    const qs=S.sessionAns.filter(a=>a.q.category===cat);
    if(!qs.length) return "";
    const r=Math.round(qs.filter(a=>a.correct).length/qs.length*100);
    return `<div class="rc-row">
      <span class="rc-icon">${CAT_META[cat].icon}</span>
      <span class="rc-name">${cat}</span>
      <div class="rc-track"><div class="rc-fill" style="width:${r}%;background:${CAT_META[cat].color}"></div></div>
      <span class="rc-pct" style="color:${scoreColor(r)}">${r}%</span>
    </div>`;
  }).join("");

  const ansLog=S.sessionAns.map((a,i)=>{
    const wc=(S.ud.wrongCounts||{})[a.q.id]||0;
    return `<div class="ans-row ${a.correct?"ar-ok":"ar-ng"}">
      <span class="ar-n">Q${i+1}</span>
      <span class="ar-cat" style="color:${CAT_META[a.q.category]?.color}">${CAT_META[a.q.category]?.icon}</span>
      <span class="ar-q">${a.q.question.slice(0,28)}…</span>
      <span class="ar-mark">${a.correct?"✓":"✗"}</span>
      ${!a.correct?`<span class="ar-cnt">×${wc}</span>`:""}
    </div>`;
  }).join("");

  return `
<div class="page fadeUp">
  <div class="result-top">
    <p class="result-eyebrow">修行完了</p>
    <div class="result-score-wrap">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
        <circle cx="70" cy="70" r="58" fill="none" stroke="${scoreColor(sessRate)}" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="${dashArr}"
          transform="rotate(-90 70 70)" style="transition:stroke-dasharray 1s ease .3s"/>
      </svg>
      <div class="result-score-inner">
        <span class="result-pct" style="color:${scoreColor(sessRate)}">${sessRate}<small>%</small></span>
        <span class="result-sub">${sessCorrect}/${S.sessionAns.length}</span>
      </div>
    </div>
    <div class="result-verdict" style="color:${scoreColor(sessRate)};border-color:${scoreColor(sessRate)}44;background:${scoreColor(sessRate)}11">${verdict}</div>
    <div class="result-cats">${catRows}</div>
  </div>
  <p class="section-hd">問題別レビュー</p>
  <div class="ans-log">${ansLog}</div>
  <button class="cta-btn" onclick="startQuiz()">もう一度</button>
  <button class="ghost-btn" onclick="startQuiz('WEAK')">弱点だけ特訓</button>
  <button class="ghost-btn" onclick="S.screen='home';render()">ホームへ戻る</button>
</div>`;
}

function buildNotebook(C){
  const {weakQs}=C;
  const cards=weakQs.map(q=>{
    const wc=(S.ud.wrongCounts||{})[q.id]||0;
    const isStar=(S.ud.starIds||[]).includes(q.id);
    const alpha=["A","B","C","D"];
    return `<div class="nb-card">
      <div class="nb-card-top">
        <span class="nb-cat" style="color:${CAT_META[q.category]?.color};background:${CAT_META[q.category]?.bg};border-color:${CAT_META[q.category]?.color}44">
          ${CAT_META[q.category]?.icon} ${q.category}
        </span>
        <div class="nb-actions">
          <span class="nb-wc" style="color:${wc>=3?"#E8572A":"#E8A020"}">✗ ${wc}回</span>
          <button class="nb-star ${isStar?"on":""}" onclick="toggleStar(${q.id})">${isStar?"★":"☆"}</button>
          <button class="nb-resolve" onclick="clearWrong(${q.id})">解決</button>
        </div>
      </div>
      <p class="nb-q">${q.question}</p>
      <div class="nb-ans-box">
        <span class="nb-ans-lbl">正解</span>
        <span class="nb-ans-val">${alpha[q.answer]}. ${q.choices[q.answer]}</span>
      </div>
      <details class="nb-details">
        <summary class="nb-summary">解説を見る ▾</summary>
        <p class="nb-exp">${q.explanation}</p>
      </details>
    </div>`;
  }).join("");

  const empty=`<div class="empty-wrap">
    <div class="empty-icon">🎉</div>
    <p class="empty-msg">まだ間違えた問題はありません</p>
    <p class="empty-sub">どんどん問題に挑戦しよう！</p>
  </div>`;

  return `
<div class="page fadeUp">
  <div class="nb-nav">
    <button class="nav-back" onclick="S.screen='home';render()">${svgBack()}</button>
    <h2 class="nb-title">間違いノート</h2>
    <span class="nb-count">${weakQs.length}問</span>
  </div>
  ${weakQs.length===0?empty:`<div class="nb-list">${cards}</div>`}
</div>`;
}

// ─── INIT ────────────────────────────────────────────────────

// ── PC用: 右カラムの解説・統計HTML生成 ──────────────────
function buildPcExpPanel(C) {
  const { current, isAnswered, isCorrect, sessCorrect, sessRate } = C;
  const alpha = ["A","B","C","D"];
  const sessWrong = S.sessionAns.filter(a => !a.correct).length;
  if (!isAnswered) {
    return `<div class="pc-exp-panel">
      <div class="pc-panel-title">解説</div>
      <div class="pc-placeholder">選択肢を選ぶと解説が表示されます</div>
    </div>`;
  }
  const cls = isCorrect && !S.timedOut ? "exp-ok" : S.timedOut ? "exp-time" : "exp-ng";
  const verdict = S.timedOut ? "⏰ 時間切れ" : isCorrect ? "✓ 正解！" : "✗ 不正解";
  const vcolor = isCorrect && !S.timedOut ? "var(--green)" : S.timedOut ? "var(--gold)" : "var(--red)";
  return `<div class="pc-exp-panel ${cls}">
    <div class="pc-panel-title">解説</div>
    <div class="pc-exp-verdict" style="color:${vcolor}">${verdict}${S.timedOut ? ` — 正解：${alpha[current.answer]}` : ""}</div>
    <div class="pc-exp-inner">${current ? current.explanation : ""}</div>
  </div>`;
}

function buildPcStatsPanel(C) {
  const { overallRate, totalAnswered, weakQs, sessCorrect, sessRate } = C;
  const sessTotal = S.sessionAns.length;
  const sessWrong = sessTotal - sessCorrect;
  const catRows = Object.keys(CAT_META).map(cat => {
    const hist = (S.ud.history || []).filter(h => {
      const q = ALL_QUESTIONS.find(q => q.id === h.id);
      return q && q.category === cat;
    });
    if (!hist.length) return `<div class="pc-cat-row"><span class="pc-cat-icon">${CAT_META[cat].icon}</span><span class="pc-cat-name">${cat}</span><div class="pc-cat-track"><div class="pc-cat-fill" style="width:0%;background:${CAT_META[cat].color}"></div></div><span class="pc-cat-pct" style="color:var(--text3)">—</span></div>`;
    const r = Math.round(hist.filter(h => h.correct).length / hist.length * 100);
    return `<div class="pc-cat-row">
      <span class="pc-cat-icon">${CAT_META[cat].icon}</span>
      <span class="pc-cat-name">${cat}</span>
      <div class="pc-cat-track"><div class="pc-cat-fill" style="width:${r}%;background:${CAT_META[cat].color}"></div></div>
      <span class="pc-cat-pct" style="color:${scoreColor(r)}">${r}%</span>
    </div>`;
  }).join("");
  return `<div class="pc-stats-panel">
    <div class="pc-panel-title">セッション統計</div>
    <div class="pc-stat-row"><span class="pc-stat-lbl">正解</span><span class="pc-stat-val" style="color:var(--green)">${sessCorrect}</span></div>
    <div class="pc-stat-row"><span class="pc-stat-lbl">不正解</span><span class="pc-stat-val" style="color:var(--red)">${sessWrong}</span></div>
    <div class="pc-stat-row"><span class="pc-stat-lbl">通算解答数</span><span class="pc-stat-val">${totalAnswered}</span></div>
    <div class="pc-stat-row"><span class="pc-stat-lbl">通算正答率</span><span class="pc-stat-val" style="color:${scoreColor(overallRate)}">${overallRate !== null ? overallRate + "%" : "—"}</span></div>
    <div class="pc-divider"></div>
    <div class="pc-panel-title">カテゴリ別正答率</div>
    ${catRows}
  </div>`;
}

render();
</script>
</body>
</html>
