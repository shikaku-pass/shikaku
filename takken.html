<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>宅建 錬成道場 | 資格Pass</title>
<meta name="description" content="宅地建物取引士（宅建）の無料問題集。全20問・弱点特訓・スター登録機能つき。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E0E12;--ink2:#161620;--ink3:#1E1E2A;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);
  --red:#E8572A;--gold:#E8A020;--green:#3DB87A;--blue:#4A9EE8;
  --accent:#F57F17;
  --text:#ECEAF4;--text2:#A09EB8;--text3:#5A5870;
  --font-d:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
  --font-b:'Noto Sans JP',sans-serif;
  --radius:16px;--radius-sm:10px;--tap:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ink);font-family:var(--font-b);min-height:100vh;}
.root{min-height:100vh;background:radial-gradient(ellipse 80% 40% at 15% 0%,rgba(245,127,23,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 100%,rgba(74,158,232,0.05) 0%,transparent 60%),var(--ink);color:var(--text);display:flex;justify-content:center;}
.page{width:100%;max-width:430px;padding:0 16px 80px;display:flex;flex-direction:column;gap:14px;}
.quiz-page{gap:11px;}
.fadeUp{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slideIn{animation:slideIn .3s cubic-bezier(.16,1,.3,1) both;}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.home-shell{width:100%;max-width:430px;min-height:100vh;padding:0 18px;display:flex;flex-direction:column;}
.home-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.home-logo{display:flex;align-items:center;gap:8px;}
.home-brand{font-family:var(--font-d);font-size:17px;font-weight:900;letter-spacing:2px;}
.home-nb-btn{position:relative;width:40px;height:40px;border-radius:var(--radius-sm);background:var(--ink3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s;}
.home-nb-btn:hover{border-color:var(--border2);}
.home-nb-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 0 2px var(--ink);}
.home-hero{display:flex;align-items:center;gap:14px;padding:18px 0 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.home-hero-left{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.home-exam-type{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:2.5px;}
.home-exam-name{font-family:var(--font-d);font-size:22px;font-weight:900;letter-spacing:.5px;line-height:1.1;}
.home-stats-row{display:flex;align-items:center;gap:0;margin-top:2px;}
.home-stat{display:flex;flex-direction:column;align-items:center;padding:0 12px 0 0;}
.hs-num{font-family:var(--font-d);font-size:18px;font-weight:900;line-height:1;}
.hs-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.home-stat-div{width:1px;height:28px;background:var(--border);margin-right:12px;}
.home-rank{display:flex;flex-direction:column;align-items:center;gap:4px;border:1.5px solid;border-radius:14px;padding:10px 14px;flex-shrink:0;min-width:58px;}
.home-rank-k{font-family:var(--font-d);font-size:26px;font-weight:900;line-height:1;}
.home-rank-l{font-size:10px;font-weight:700;letter-spacing:1px;}
.home-rank-bar{width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:2px;}
.home-rank-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.home-bottom{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:10px;padding:16px 0 28px;}
.home-modes{display:flex;gap:7px;}
.hm-btn{flex:1;background:var(--ink3);border:1.5px solid var(--border);border-radius:12px;padding:10px 4px;cursor:pointer;font-family:var(--font-b);display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);transition:all .18s;min-height:72px;}
.hm-btn:hover:not(.hm-off){background:rgba(255,255,255,0.06);border-color:var(--border2);}
.hm-active{background:rgba(245,127,23,0.1)!important;border-color:rgba(245,127,23,0.5)!important;color:var(--accent)!important;}
.hm-off{opacity:.35;cursor:not-allowed;}
.hm-icon{font-size:18px;line-height:1;}
.hm-label{font-size:12px;font-weight:700;}
.hm-count{font-size:10px;color:var(--text3);}
.home-cats{display:flex;gap:6px;flex-wrap:wrap;transition:opacity .2s,max-height .3s;}
.home-cats-hidden{opacity:0;pointer-events:none;max-height:0!important;overflow:hidden;margin:0;}
.hc-chip{background:var(--ink3);border:1px solid var(--border);border-radius:16px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font-b);transition:all .18s;}
.hc-active{border-color:var(--border2)!important;color:var(--text)!important;background:rgba(255,255,255,0.09)!important;}
.home-opts{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ho-timer{display:flex;align-items:center;gap:5px;}
.ho-label{font-size:12px;color:var(--text3);margin-right:2px;}
.ho-pill{background:var(--ink3);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font-b);transition:all .18s;}
.ho-on{background:rgba(74,158,232,0.12)!important;border-color:var(--blue)!important;color:var(--blue)!important;}
.ho-shuffle.ho-on{background:rgba(61,184,122,0.1)!important;border-color:rgba(61,184,122,0.4)!important;color:var(--green)!important;}
.home-start{background:linear-gradient(135deg,#F57F17 0%,#E65100 100%);color:#fff;border:none;border-radius:var(--radius);width:100%;height:56px;font-size:18px;font-weight:900;cursor:pointer;font-family:var(--font-d);letter-spacing:2px;box-shadow:0 4px 24px rgba(245,127,23,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.home-start:hover{transform:translateY(-1px);box-shadow:0 6px 32px rgba(245,127,23,.5);}
.home-start-off{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.ghost-btn{background:transparent;border:1.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;width:100%;height:var(--tap);font-size:15px;font-family:var(--font-b);transition:all .2s;}
.ghost-btn:hover{background:rgba(255,255,255,0.04);}
.text-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--font-b);text-decoration:underline;align-self:center;padding:4px;}
.section-hd{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:4px 0 0;}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;padding-top:16px;}
.nav-back{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--ink3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nav-back:hover{border-color:var(--border2);}
.quiz-counter{display:flex;align-items:baseline;gap:3px;}
.qc-cur{font-family:var(--font-d);font-size:28px;font-weight:900;color:var(--text);}
.qc-sep{font-size:14px;color:var(--text3);}
.qc-tot{font-size:16px;color:var(--text3);}
.star-nav-btn{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--ink3);border:1px solid var(--border);font-size:22px;cursor:pointer;color:var(--text3);transition:all .2s;line-height:1;}
.star-nav-btn.on{color:var(--gold);border-color:rgba(232,160,32,0.4);background:rgba(232,160,32,0.1);}
.q-progress{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;}
.q-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#FFB300);border-radius:2px;transition:width .4s ease;}
.timer-wrap{position:relative;width:48px;height:48px;align-self:center;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;font-weight:900;transition:color .3s;}
.session-bar{display:flex;align-items:center;gap:8px;}
.sb-correct{font-size:12px;font-weight:700;color:var(--green);min-width:32px;}
.sb-wrong{font-size:12px;font-weight:700;color:var(--red);min-width:32px;text-align:right;}
.sb-dots{flex:1;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.sb-dot{width:8px;height:8px;border-radius:50%;}
.sd-ok{background:var(--green);}
.sd-ng{background:var(--red);}
.sd-cur{background:var(--gold);width:10px;height:10px;}
.sd-future{background:rgba(255,255,255,0.12);}
.sb-more{font-size:10px;color:var(--text3);}
.q-card{background:var(--ink3);border:1px solid var(--border);border-radius:20px;padding:18px 18px 20px;}
.q-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.q-cat-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;letter-spacing:.5px;}
.q-miss-badge{font-size:11px;font-weight:700;color:var(--red);background:rgba(232,87,42,0.12);border:1px solid rgba(232,87,42,0.25);padding:4px 10px;border-radius:7px;}
.q-text{font-size:16px;line-height:1.85;color:var(--text);font-weight:500;}
.choices-wrap{display:flex;flex-direction:column;gap:9px;}
.choice-btn{background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:14px;padding:0 14px;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;gap:12px;text-align:left;transition:background .15s,border-color .15s,transform .15s;color:var(--text2);min-height:var(--tap);width:100%;}
.choice-btn:not(.ch-correct):not(.ch-wrong):not(.ch-faded):hover{background:rgba(255,255,255,0.08);border-color:var(--border2);transform:translateX(3px);}
.ch-correct{background:rgba(61,184,122,.15)!important;border-color:#3DB87A!important;color:#6EE7B7!important;}
.ch-wrong{background:rgba(232,87,42,.15)!important;border-color:var(--red)!important;color:#FCA5A5!important;}
.ch-faded{opacity:.35;}
.ch-alpha{font-family:var(--font-d);font-weight:900;font-size:13px;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s;}
.ch-body{flex:1;font-size:14px;line-height:1.6;padding:13px 0;}
.ch-result{font-size:18px;font-weight:700;color:var(--green);}
.exp-card{border-radius:14px;padding:16px;border:1px solid;}
.exp-ok{background:rgba(61,184,122,.08);border-color:rgba(61,184,122,.3);}
.exp-ng{background:rgba(232,87,42,.08);border-color:rgba(232,87,42,.3);}
.exp-time{background:rgba(232,160,32,.08);border-color:rgba(232,160,32,.3);}
.exp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.exp-verdict{font-size:14px;font-weight:700;}
.exp-ok .exp-verdict{color:var(--green);}
.exp-ng .exp-verdict{color:var(--red);}
.exp-time .exp-verdict{color:var(--gold);}
.exp-correct-ans{font-size:12px;color:var(--gold);}
.exp-body{font-size:13px;line-height:1.9;color:var(--text2);}
.next-wrap{position:sticky;bottom:20px;background:linear-gradient(to top,var(--ink) 60%,transparent);padding-top:12px;}
.next-btn{background:linear-gradient(135deg,#F57F17 0%,#E65100 100%);color:#fff;border:none;border-radius:var(--radius);width:100%;height:var(--tap);font-size:17px;font-weight:700;cursor:pointer;font-family:var(--font-d);letter-spacing:1px;box-shadow:0 4px 20px rgba(245,127,23,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.next-btn:hover{transform:translateY(-1px);}
.cta-btn{background:linear-gradient(135deg,#F57F17 0%,#E65100 100%);color:#fff;border:none;border-radius:var(--radius);width:100%;height:var(--tap);font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-d);letter-spacing:1px;box-shadow:0 4px 20px rgba(245,127,23,.4);transition:all .2s;}
.cta-btn:hover{transform:translateY(-1px);}
.result-top{display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:20px;}
.result-eyebrow{font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;}
.result-score-wrap{position:relative;width:140px;height:140px;}
.result-score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-pct{font-family:var(--font-d);font-size:42px;font-weight:900;line-height:1;}
.result-pct small{font-size:18px;}
.result-sub{font-size:12px;color:var(--text3);margin-top:3px;}
.result-verdict{font-size:15px;font-weight:700;padding:10px 24px;border-radius:var(--radius-sm);border:1px solid;}
.result-cats{width:100%;display:flex;flex-direction:column;gap:8px;}
.rc-row{display:flex;align-items:center;gap:8px;}
.rc-icon{font-size:14px;}
.rc-name{font-size:11px;font-weight:700;width:60px;color:var(--text2);}
.rc-track{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.rc-fill{height:100%;border-radius:3px;transition:width 1s ease .5s;}
.rc-pct{font-size:11px;font-weight:700;width:32px;text-align:right;}
.ans-log{display:flex;flex-direction:column;gap:7px;}
.ans-row{display:flex;align-items:center;gap:8px;background:var(--ink3);border-radius:10px;padding:11px 12px;border:1px solid var(--border);border-left:3px solid var(--border);}
.ar-ok{border-left-color:var(--green)!important;}
.ar-ng{border-left-color:var(--red)!important;}
.ar-n{font-size:11px;color:var(--text3);min-width:24px;}
.ar-cat{font-size:14px;}
.ar-q{flex:1;font-size:12px;color:var(--text2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.ar-mark{font-size:16px;font-weight:700;}
.ar-ok .ar-mark{color:var(--green);}
.ar-ng .ar-mark{color:var(--red);}
.ar-cnt{font-size:10px;color:var(--red);background:rgba(232,87,42,0.12);padding:2px 7px;border-radius:5px;}
.nb-nav{display:flex;align-items:center;gap:12px;padding-top:16px;}
.nb-title{font-family:var(--font-d);font-size:20px;font-weight:900;flex:1;letter-spacing:1px;}
.nb-count{font-size:13px;color:var(--text3);}
.nb-list{display:flex;flex-direction:column;gap:12px;}
.nb-card{background:var(--ink3);border:1px solid var(--border);border-radius:18px;padding:16px;transition:border-color .2s;}
.nb-card:hover{border-color:var(--border2);}
.nb-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.nb-cat{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid;}
.nb-actions{display:flex;align-items:center;gap:8px;}
.nb-wc{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(232,87,42,0.12);}
.nb-star{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);transition:color .2s;line-height:1;}
.nb-star.on{color:var(--gold);}
.nb-resolve{background:rgba(61,184,122,0.12);border:1px solid rgba(61,184,122,0.3);border-radius:7px;color:var(--green);font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;font-family:var(--font-b);transition:all .2s;}
.nb-q{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:10px;font-weight:500;}
.nb-ans-box{background:rgba(61,184,122,0.07);border-radius:9px;padding:9px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start;}
.nb-ans-lbl{font-size:11px;color:var(--green);font-weight:700;white-space:nowrap;margin-top:1px;}
.nb-ans-val{font-size:13px;color:#6EE7B7;line-height:1.5;}

.nb-summary::-webkit-details-marker{display:none;}
.nb-exp{font-size:12px;line-height:1.9;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.empty-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:60px 20px;text-align:center;}
.empty-icon{font-size:48px;}
.empty-msg{font-size:16px;font-weight:700;color:var(--text2);}
.empty-sub{font-size:13px;color:var(--text3);}
</style>

<body>
<div class="root"><div id="app"></div></div>
<script>
const ALL_QUESTIONS=[
  {id:1,category:"宅建業法",question:"宅地建物取引業者が宅地の売買契約を締結する際に、相手方に交付しなければならない書面はどれか。",choices:["媒介契約書","37条書面（契約書面）","35条書面（重要事項説明書）","標準媒介契約約款"],answer:1,explanation:"売買契約締結時に交付が義務付けられているのは37条書面（契約書面）です。35条書面（重要事項説明書）は契約前に説明・交付します。"},
  {id:2,category:"宅建業法",question:"宅地建物取引士の設置義務について、事務所の専任の宅地建物取引士の設置基準として正しいものはどれか。",choices:["業務に従事する者10人に1人以上","業務に従事する者5人に1人以上","業務に従事する者3人に1人以上","全員が宅地建物取引士でなければならない"],answer:1,explanation:"宅地建物取引業者の事務所には、業務に従事する者5人に1人以上の割合で専任の宅地建物取引士を設置しなければなりません。"},
  {id:3,category:"法令制限",question:"都市計画区域内において、建築物の建築に際して原則として都道府県知事等の許可が必要な行為はどれか。",choices:["市街化区域内での建築","市街化調整区域内での開発行為","準都市計画区域内での建築","用途地域内での増築"],answer:1,explanation:"市街化調整区域内での開発行為（一定規模以上の土地の区画形質の変更）は、都道府県知事の許可が必要です。"},
  {id:4,category:"民法",question:"売買契約において、売主の契約不適合責任に関する記述として正しいものはどれか。",choices:["買主は不適合を知った時から1年以内に通知すれば権利を行使できる","買主が不適合を知った時から5年で時効","売主が不適合を知っていた場合も責任期間は1年","引渡しから10年で必ず消滅する"],answer:0,explanation:"契約不適合責任において、買主は不適合を知った時から1年以内にその旨を売主に通知しなければ、原則として追完請求・代金減額請求・損害賠償・解除の権利を失います。"},
  {id:5,category:"宅建業法",question:"宅地建物取引業者が行う広告に関する規制として、正しいものはどれか。",choices:["建築確認前でも「建築確認申請中」と表示すれば広告できる","未完成物件は広告できない","開発許可・建築確認等の処分後でなければ広告できない","賃貸物件の広告には制限がない"],answer:2,explanation:"宅地建物取引業者は、宅地の造成・建物建築に必要な許可・確認等が下りる前は、売買その他の業務に関する広告をしてはなりません。"},
  {id:6,category:"法令制限",question:"建築基準法の用途制限において、第一種低層住居専用地域内に建築できる建築物として正しいものはどれか。",choices:["コンビニエンスストア（床面積150㎡）","小学校","ホテル","カラオケボックス"],answer:1,explanation:"第一種低層住居専用地域には小学校・中学校・高等学校は建築できます。コンビニ・ホテル・カラオケは建築できません。"},
  {id:7,category:"民法",question:"不動産の時効取得について、悪意の占有者が取得時効を完成させるために必要な占有期間として正しいものはどれか。",choices:["5年","10年","15年","20年"],answer:3,explanation:"悪意または有過失の占有者が取得時効を主張するには、20年間の占有継続が必要です。善意かつ無過失の場合は10年です。"},
  {id:8,category:"宅建業法",question:"宅地建物取引業者が媒介契約を締結した際に作成する媒介契約書について、正しいものはどれか。",choices:["口頭でも媒介契約は有効で書面は不要","媒介契約書は依頼者への交付義務はない","専任媒介契約の有効期間は最長3か月","一般媒介契約でも必ず登録義務がある"],answer:2,explanation:"専任媒介契約（専属専任媒介契約も同様）の有効期間は3か月を超えることができず、依頼者の申し出があれば更新できますが、更新も3か月が上限です。"},
  {id:9,category:"法令制限",question:"建蔽率の算定において、建蔽率の制限が緩和される場合として正しいものはどれか。",choices:["準防火地域内で耐火建築物を建てる場合は10%加算","角地指定を受けた敷地は10%加算","防火地域内で耐火建築物を建てる場合は20%加算","用途地域の指定がない地域は緩和なし"],answer:1,explanation:"特定行政庁が指定する角地（2方向が道路に面する敷地）では、建蔽率が10%加算されます。防火地域内耐火建築物は10%加算（防火地域＋角地なら20%加算）です。"},
  {id:10,category:"民法",question:"抵当権に関する記述として、正しいものはどれか。",choices:["抵当権は占有を移転しなければ設定できない","抵当権の実行には裁判所の許可が必要","抵当権は被担保債権の利息について最後の2年分しか優先弁済を受けられない","抵当権者は物件を使用・収益できる"],answer:2,explanation:"抵当権者は、利息・遅延損害金等については最後の2年分についてのみ、後順位抵当権者や一般債権者に優先して弁済を受けられます（民法375条）。"},
  {id:11,category:"宅建業法",question:"クーリング・オフに関する記述として、正しいものはどれか。",choices:["事務所で契約した場合もクーリング・オフできる","クーリング・オフの期間は契約日から8日以内","喫茶店で勧誘を受け後日事務所で契約した場合クーリング・オフできる","宅地建物取引業者同士の取引にも適用される"],answer:2,explanation:"買主が申し出た場所ではなく、業者側の指定した喫茶店等（事務所以外の場所）で勧誘が行われた場合は、後日事務所で契約してもクーリング・オフの対象となります。"},
  {id:12,category:"法令制限",question:"農地法第3条の許可（農地の権利移動）に関して、許可が不要な場合として正しいものはどれか。",choices:["農地を農地として売買する場合","農地を宅地に転用する目的で売買する場合","相続によって農地を取得する場合","農地を農地として賃貸する場合"],answer:2,explanation:"相続・遺産分割・法人の合併等による農地の取得は農地法3条の許可が不要です（ただし農業委員会への届出は必要）。"},
  {id:13,category:"民法",question:"連帯保証に関する記述として、正しいものはどれか。",choices:["連帯保証人は主債務者に先に請求するよう求める権利がある","連帯保証人は催告の抗弁権を持つ","連帯保証人には検索の抗弁権がない","連帯保証は主債務者の承諾がなければ成立しない"],answer:2,explanation:"連帯保証人には催告の抗弁権（まず主債務者へ）も検索の抗弁権（まず主債務者の財産へ）もありません。通常の保証人はこれらの権利を持ちます。"},
  {id:14,category:"宅建業法",question:"宅地建物取引業保証協会の弁済業務保証金制度について、正しいものはどれか。",choices:["弁済業務保証金分担金は主たる事務所60万円","弁済業務保証金は供託所に供託する","一般消費者も弁済を受けられる","宅地建物取引業者も還付を受けられる"],answer:2,explanation:"宅地建物取引業保証協会の弁済業務保証金制度では、宅地建物取引業者と取引して損害を受けた一般消費者（宅建業者を除く）が還付（弁済）を受けられます。"},
  {id:15,category:"法令制限",question:"道路に関する建築基準法の規定で、接道義務として正しいものはどれか。",choices:["建築物の敷地は幅員4m以上の道路に2m以上接しなければならない","建築物の敷地は幅員6m以上の道路に1m以上接しなければならない","建築物の敷地は幅員2m以上の道路に接していれば足りる","接道義務の規定は都市計画区域外には適用されない"],answer:0,explanation:"都市計画区域・準都市計画区域内の建築物の敷地は、幅員4m以上の道路に2m以上接しなければなりません（接道義務）。"},
  {id:16,category:"民法",question:"不法行為による損害賠償請求権の消滅時効について、正しいものはどれか。",choices:["損害および加害者を知った時から1年","損害および加害者を知った時から3年","不法行為の時から20年（除斥期間）","生命・身体の侵害は損害等を知った時から5年"],answer:3,explanation:"2020年の民法改正により、生命・身体の侵害による損害賠償請求権は、損害および加害者を知った時から5年、不法行為の時から20年で時効消滅します。"},
  {id:17,category:"宅建業法",question:"宅地建物取引士証の有効期間と更新について、正しいものはどれか。",choices:["有効期間は3年","有効期間は5年で、更新には法定講習の受講が必要","有効期間は10年","更新手続きは不要で自動延長される"],answer:1,explanation:"宅地建物取引士証の有効期間は5年です。更新の際には、都道府県知事が指定する登録講習機関が行う法定講習（更新前6か月以内）を受講する必要があります。"},
  {id:18,category:"法令制限",question:"土地区画整理法に基づく土地区画整理事業の仮換地の指定について、正しいものはどれか。",choices:["仮換地の指定後も従前の宅地の使用・収益は継続できる","仮換地の指定後は仮換地を使用・収益できるが従前の宅地は使用できなくなる","仮換地指定には地権者全員の同意が必要","仮換地指定後に建物を建てることはできない"],answer:1,explanation:"仮換地の指定を受けた者は、換地処分があるまでの間、仮換地を使用・収益できます。一方、従前の宅地の使用・収益は原則としてできなくなります。"},
  {id:19,category:"民法",question:"賃貸借契約における敷金に関する記述として、正しいものはどれか。",choices:["敷金は契約終了時に必ず全額返還される","敷金は賃借人の債務の担保として賃貸人が受け取るものである","敷金返還義務は賃借人が明け渡した後でも発生しない","賃借人は賃料の不払いを敷金から充当するよう請求できる"],answer:1,explanation:"敷金は、賃貸借に基づいて生じる賃借人の一切の債務を担保する目的で賃借人が賃貸人に交付する金銭です。賃借人は原則として敷金を賃料に充当するよう請求できません。"},
  {id:20,category:"宅建業法",question:"宅地建物取引業者が受け取ることができる報酬（売買の媒介）の上限額について、売買代金400万円超の場合の計算式として正しいものはどれか。",choices:["売買代金の3%","売買代金の3%＋6万円","売買代金の3%＋6万円（税別）","売買代金の5%"],answer:2,explanation:"売買代金400万円超の媒介報酬の上限は「売買代金×3%＋6万円（税別）」です。これに消費税を加算した金額が最大受領額となります。"},
];

const CAT_META={
  "宅建業法":{color:"#F57F17",icon:"🏢",bg:"rgba(245,127,23,0.12)"},
  "法令制限":{color:"#4A9EE8",icon:"📋",bg:"rgba(74,158,232,0.12)"},
  "民法":    {color:"#9B6FE8",icon:"⚖️",bg:"rgba(155,111,232,0.12)"},
};
const RANK_THRESHOLDS=[
  {min:0,  label:"入門",kanji:"入",color:"#888"},
  {min:10, label:"初段",kanji:"初",color:"#9b7a4a"},
  {min:30, label:"二段",kanji:"二",color:"#7a9b4a"},
  {min:60, label:"三段",kanji:"三",color:"#4a7a9b"},
  {min:100,label:"四段",kanji:"四",color:"#7a4a9b"},
  {min:150,label:"名人",kanji:"名",color:"#E8A020"},
];
const STORAGE_KEY="takken_dojo_v1";
function getRank(n){return[...RANK_THRESHOLDS].reverse().find(r=>n>=r.min)||RANK_THRESHOLDS[0];}
function getNextRank(n){return RANK_THRESHOLDS.find(r=>r.min>n);}
function scoreColor(p){if(p===null||p===undefined)return"#555";return p>=80?"#3DB87A":p>=60?"#E8A020":"#E8572A";}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch{}return{wrongCounts:{},starIds:[],history:[],totalSessions:0,totalAnswered:0};}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}

let S={screen:"home",ud:loadData(),mode:"ALL",filterCat:"全て",timerSec:0,doShuffle:true,deck:[],idx:0,selected:null,showExp:false,sessionAns:[],timeLeft:null,timedOut:false,timerInterval:null};
function setUd(fn){S.ud=typeof fn==="function"?fn(S.ud):fn;saveData(S.ud);}
function computed(){const ud=S.ud;const totalAnswered=ud.totalAnswered||0;const rank=getRank(totalAnswered);const nextRank=getNextRank(totalAnswered);const rankProgress=nextRank?Math.round(((totalAnswered-rank.min)/(nextRank.min-rank.min))*100):100;const recentHist=(ud.history||[]).slice(-200);const overallRate=recentHist.length>0?Math.round(recentHist.filter(h=>h.correct).length/recentHist.length*100):null;const weakQs=ALL_QUESTIONS.filter(q=>(ud.wrongCounts||{})[q.id]>0).sort((a,b)=>((ud.wrongCounts[b.id]||0)-(ud.wrongCounts[a.id]||0)));const starQs=ALL_QUESTIONS.filter(q=>(ud.starIds||[]).includes(q.id));const current=S.deck[S.idx];const isAnswered=S.selected!==null||S.timedOut;const isCorrect=S.selected===current?.answer;const sessCorrect=S.sessionAns.filter(a=>a.correct).length;const sessRate=S.sessionAns.length>0?Math.round(sessCorrect/S.sessionAns.length*100):0;const timerPct=S.timerSec>0&&S.timeLeft!==null?Math.round(S.timeLeft/S.timerSec*100):100;const timerColor=timerPct>50?"#3DB87A":timerPct>25?"#E8A020":"#E8572A";return{totalAnswered,rank,nextRank,rankProgress,overallRate,weakQs,starQs,current,isAnswered,isCorrect,sessCorrect,sessRate,timerPct,timerColor};}
function startTimer(){clearInterval(S.timerInterval);if(S.timerSec===0||S.selected!==null||S.timedOut)return;S.timeLeft=S.timerSec;S.timerInterval=setInterval(()=>{S.timeLeft--;if(S.timeLeft<=0){clearInterval(S.timerInterval);S.timedOut=true;S.showExp=true;}render();},1000);}
function startQuiz(overrideMode){clearInterval(S.timerInterval);const m=overrideMode||S.mode;let pool=[...ALL_QUESTIONS];if(m==="WEAK")pool=ALL_QUESTIONS.filter(q=>(S.ud.wrongCounts||{})[q.id]>0);else if(m==="STAR")pool=ALL_QUESTIONS.filter(q=>(S.ud.starIds||[]).includes(q.id));else if(S.filterCat!=="全て")pool=pool.filter(q=>q.category===S.filterCat);if(pool.length===0)return;if(overrideMode)S.mode=overrideMode;S.deck=S.doShuffle?shuffle(pool):pool;S.idx=0;S.selected=null;S.showExp=false;S.sessionAns=[];S.timedOut=false;S.timeLeft=null;S.screen="quiz";render();startTimer();}
function handleSelect(i){if(S.selected!==null||S.timedOut)return;clearInterval(S.timerInterval);S.selected=i;S.showExp=true;const q=S.deck[S.idx];const correct=i===q.answer;setUd(prev=>({...prev,wrongCounts:{...prev.wrongCounts,[q.id]:correct?Math.max(0,(prev.wrongCounts||{})[q.id]||0):((prev.wrongCounts||{})[q.id]||0)+1},history:[...(prev.history||[]).slice(-499),{id:q.id,correct,ts:Date.now()}],totalAnswered:(prev.totalAnswered||0)+1}));render();}
function handleNext(){const q=S.deck[S.idx];const correct=S.selected===q.answer;S.sessionAns=[...S.sessionAns,{q,correct,selected:S.selected}];if(S.idx+1>=S.deck.length){setUd(prev=>({...prev,totalSessions:(prev.totalSessions||0)+1}));S.screen="result";render();}else{S.idx++;S.selected=null;S.showExp=false;S.timedOut=false;S.timeLeft=null;render();startTimer();}}
function toggleStar(id){setUd(prev=>({...prev,starIds:(prev.starIds||[]).includes(id)?(prev.starIds||[]).filter(s=>s!==id):[...(prev.starIds||[]),id]}));render();}
function clearWrong(id){setUd(prev=>{const wc={...prev.wrongCounts};delete wc[id];return{...prev,wrongCounts:wc};});render();}
function resetData(){if(confirm("学習データをすべてリセットしますか？")){const d={wrongCounts:{},starIds:[],history:[],totalSessions:0,totalAnswered:0};saveData(d);S.ud=d;render();}}
function render(){document.getElementById("app").innerHTML=buildHTML();}
function svgArrow(){return`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;}
function svgBack(){return`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;}
function svgBook(){return`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>`;}
function buildHTML(){const C=computed();if(S.screen==="home")return buildHome(C);if(S.screen==="quiz")return buildQuiz(C);if(S.screen==="result")return buildResult(C);if(S.screen==="notebook")return buildNotebook(C);return"";}
function buildHome(C){const{totalAnswered,rank,rankProgress,overallRate,weakQs,starQs}=C;const modes=[{k:"ALL",label:"全問",icon:"📚",count:ALL_QUESTIONS.length,disabled:false},{k:"WEAK",label:"弱点特訓",icon:"🔥",count:weakQs.length,disabled:weakQs.length===0},{k:"STAR",label:"★登録",icon:"⭐",count:starQs.length,disabled:starQs.length===0}];const cats=["全て",...Object.keys(CAT_META)];const startOff=(S.mode==="WEAK"&&weakQs.length===0)||(S.mode==="STAR"&&starQs.length===0);return`<div class="home-shell fadeUp"><header class="home-topbar"><div class="home-logo"><svg width="22" height="22" viewBox="0 0 36 36"><path d="M18 4L4 16h4v16h20V16h4L18 4z" fill="none" stroke="#F57F17" stroke-width="2.5" stroke-linejoin="round"/><rect x="14" y="22" width="8" height="10" fill="none" stroke="#F57F17" stroke-width="2"/></svg><span class="home-brand">錬成道場</span></div><button class="home-nb-btn" onclick="S.screen='notebook';render()">${svgBook()}${weakQs.length>0?'<span class="home-nb-dot"></span>':""}</button></header><div class="home-hero"><div class="home-hero-left"><span class="home-exam-type">宅地建物取引士</span><span class="home-exam-name">宅建士</span><div class="home-stats-row"><div class="home-stat"><span class="hs-num" style="color:${scoreColor(overallRate)}">${overallRate!==null?overallRate+"%":"—"}</span><span class="hs-lbl">正答率</span></div><div class="home-stat-div"></div><div class="home-stat"><span class="hs-num">${totalAnswered}</span><span class="hs-lbl">解答数</span></div>${weakQs.length>0?`<div class="home-stat-div"></div><div class="home-stat"><span class="hs-num" style="color:#E8572A">${weakQs.length}</span><span class="hs-lbl">要復習</span></div>`:""}</div></div><div class="home-rank" style="border-color:${rank.color}55;background:${rank.color}0e"><span class="home-rank-k" style="color:${rank.color}">${rank.kanji}</span><span class="home-rank-l" style="color:${rank.color}">${rank.label}</span><div class="home-rank-bar"><div class="home-rank-fill" style="width:${rankProgress}%;background:${rank.color}"></div></div></div></div><div class="home-bottom"><div class="home-modes">${modes.map(m=>`<button class="hm-btn ${S.mode===m.k?"hm-active":""} ${m.disabled?"hm-off":""}" onclick="${m.disabled?"":"S.mode='"+m.k+"';render()"}"><span class="hm-icon">${m.icon}</span><span class="hm-label">${m.label}</span><span class="hm-count">${m.count}問</span></button>`).join("")}</div><div class="home-cats ${S.mode!=="ALL"?"home-cats-hidden":""}">${cats.map(cat=>{const isActive=S.filterCat===cat;const meta=CAT_META[cat];const style=isActive&&meta?`background:${meta.bg};border-color:${meta.color};color:${meta.color}`:"";return`<button class="hc-chip ${isActive?"hc-active":""}" style="${style}" onclick="S.filterCat='${cat}';render()">${cat!=="全て"&&meta?meta.icon+" ":""}${cat}</button>`;}).join("")}</div><div class="home-opts"><div class="ho-timer"><span class="ho-label">⏱</span>${[0,30,60].map(t=>`<button class="ho-pill ${S.timerSec===t?"ho-on":""}" onclick="S.timerSec=${t};render()">${t===0?"なし":t+"s"}</button>`).join("")}</div><button class="ho-pill ho-shuffle ${S.doShuffle?"ho-on":""}" onclick="S.doShuffle=!S.doShuffle;render()">🔀 ${S.doShuffle?"ON":"OFF"}</button></div><button class="home-start ${startOff?"home-start-off":""}" onclick="startQuiz()">修行開始 ${svgArrow()}</button><a href="index.html" style="display:block;text-align:center;color:var(--text3);font-size:12px;padding:6px;text-decoration:underline;">← 資格Pass トップへ戻る</a><button class="text-btn" onclick="resetData()">データをリセット</button></div></div>`;}
function buildQuiz(C){const{current,isAnswered,isCorrect,sessCorrect,timerPct,timerColor}=C;if(!current)return"";const sessWrong=S.sessionAns.filter(a=>!a.correct).length;const isStar=(S.ud.starIds||[]).includes(current.id);const progPct=Math.round(((S.idx+1)/S.deck.length)*100);const alpha=["A","B","C","D"];const dotsHTML=()=>{let h=S.sessionAns.map(a=>`<div class="sb-dot ${a.correct?"sd-ok":"sd-ng"}"></div>`).join("");h+=`<div class="sb-dot sd-cur"></div>`;const future=Math.min(3,S.deck.length-S.idx-1);for(let i=0;i<future;i++)h+=`<div class="sb-dot sd-future"></div>`;const more=S.deck.length-S.idx-future-1;if(more>0)h+=`<span class="sb-more">+${more}</span>`;return h;};const choicesHTML=current.choices.map((ch,i)=>{let cls="choice-btn";let alphaStyle="";let resultIcon="";if(isAnswered){if(i===current.answer){cls+=" ch-correct";alphaStyle="background:#3DB87A;color:#fff";resultIcon=`<span class="ch-result">✓</span>`;}else if(i===S.selected){cls+=" ch-wrong";alphaStyle="background:#E8572A;color:#fff";resultIcon=`<span class="ch-result" style="color:#E8572A">✗</span>`;}else cls+=" ch-faded";}return`<button class="${cls}" onclick="handleSelect(${i})"><span class="ch-alpha" style="${alphaStyle}">${alpha[i]}</span><span class="ch-body">${ch}</span>${resultIcon}</button>`;}).join("");let expHTML="";if(S.showExp){const cls=isCorrect&&!S.timedOut?"exp-ok":S.timedOut?"exp-time":"exp-ng";const verdict=S.timedOut?"⏰ 時間切れ":isCorrect?"✓ 正解！":"✗ 不正解";expHTML=`<div class="exp-card fadeUp ${cls}"><div class="exp-header"><span class="exp-verdict">${verdict}</span>${S.timedOut?`<span class="exp-correct-ans">正解：${alpha[current.answer]}</span>`:""}</div><p class="exp-body">${current.explanation}</p></div>`;}const timerHTML=S.timerSec>0?`<div class="timer-wrap"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="4"/><circle cx="24" cy="24" r="20" fill="none" stroke="${timerColor}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${timerPct*1.257} 125.7" transform="rotate(-90 24 24)" style="transition:stroke-dasharray .9s linear,stroke .3s"/></svg><span class="timer-num" style="color:${timerColor}">${S.timedOut?"✕":(S.timeLeft||"")}</span></div>`:"";const missCount=(S.ud.wrongCounts||{})[current.id]||0;return`<div class="page quiz-page fadeUp"><div class="quiz-nav"><button class="nav-back" onclick="clearInterval(S.timerInterval);S.screen='home';render()">${svgBack()}</button><div class="quiz-counter"><span class="qc-cur">${S.idx+1}</span><span class="qc-sep">/</span><span class="qc-tot">${S.deck.length}</span></div><button class="star-nav-btn ${isStar?"on":""}" onclick="toggleStar(${current.id})">${isStar?"★":"☆"}</button></div><div class="q-progress"><div class="q-prog-fill" style="width:${progPct}%"></div></div>${timerHTML}<div class="session-bar"><span class="sb-correct">✓ ${sessCorrect}</span><div class="sb-dots">${dotsHTML()}</div><span class="sb-wrong">✗ ${sessWrong}</span></div><div class="q-card slideIn"><div class="q-card-header"><span class="q-cat-badge" style="background:${CAT_META[current.category]?.bg||"rgba(255,255,255,0.08)"};color:${CAT_META[current.category]?.color||"#aaa"};border-color:${(CAT_META[current.category]?.color||"#aaa")}44">${CAT_META[current.category]?.icon} ${current.category}</span>${missCount>0?`<span class="q-miss-badge">⚡ ${missCount}回ミス</span>`:""}</div><p class="q-text">${current.question}</p></div><div class="choices-wrap">${choicesHTML}</div>${expHTML}${isAnswered?`<div class="next-wrap fadeUp"><button class="next-btn" onclick="handleNext()">${S.idx+1>=S.deck.length?"結果を見る":"次の問題"} ${svgArrow()}</button></div>`:""}</div>`;}
function buildResult(C){const{sessCorrect,sessRate}=C;const verdict=sessRate>=80?"🏆 優秀！":sessRate>=60?"✅ 合格ライン達成！":"📚 もう一度復習しよう";const catRows=Object.keys(CAT_META).map(cat=>{const qs=S.sessionAns.filter(a=>a.q.category===cat);if(!qs.length)return"";const r=Math.round(qs.filter(a=>a.correct).length/qs.length*100);return`<div class="rc-row"><span class="rc-icon">${CAT_META[cat].icon}</span><span class="rc-name">${cat}</span><div class="rc-track"><div class="rc-fill" style="width:${r}%;background:${CAT_META[cat].color}"></div></div><span class="rc-pct" style="color:${scoreColor(r)}">${r}%</span></div>`;}).join("");const ansLog=S.sessionAns.map((a,i)=>{const wc=(S.ud.wrongCounts||{})[a.q.id]||0;return`<div class="ans-row ${a.correct?"ar-ok":"ar-ng"}"><span class="ar-n">Q${i+1}</span><span class="ar-cat" style="color:${CAT_META[a.q.category]?.color}">${CAT_META[a.q.category]?.icon}</span><span class="ar-q">${a.q.question.slice(0,28)}…</span><span class="ar-mark">${a.correct?"✓":"✗"}</span>${!a.correct?`<span class="ar-cnt">×${wc}</span>`:""}</div>`;}).join("");return`<div class="page fadeUp"><div class="result-top"><p class="result-eyebrow">修行完了</p><div class="result-score-wrap"><svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="58" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/><circle cx="70" cy="70" r="58" fill="none" stroke="${scoreColor(sessRate)}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${sessRate*3.644} 364.4" transform="rotate(-90 70 70)" style="transition:stroke-dasharray 1s ease .3s"/></svg><div class="result-score-inner"><span class="result-pct" style="color:${scoreColor(sessRate)}">${sessRate}<small>%</small></span><span class="result-sub">${sessCorrect}/${S.sessionAns.length}</span></div></div><div class="result-verdict" style="color:${scoreColor(sessRate)};border-color:${scoreColor(sessRate)}44;background:${scoreColor(sessRate)}11">${verdict}</div><div class="result-cats">${catRows}</div></div><p class="section-hd">問題別レビュー</p><div class="ans-log">${ansLog}</div><button class="cta-btn" onclick="startQuiz()">もう一度</button><button class="ghost-btn" onclick="startQuiz('WEAK')">弱点だけ特訓</button><button class="ghost-btn" onclick="S.screen='home';render()">ホームへ戻る</button></div>`;}
function buildNotebook(C){const{weakQs}=C;const alpha=["A","B","C","D"];const cards=weakQs.map(q=>{const wc=(S.ud.wrongCounts||{})[q.id]||0;const isStar=(S.ud.starIds||[]).includes(q.id);return`<div class="nb-card"><div class="nb-card-top"><span class="nb-cat" style="color:${CAT_META[q.category]?.color};background:${CAT_META[q.category]?.bg};border-color:${CAT_META[q.category]?.color}44">${CAT_META[q.category]?.icon} ${q.category}</span><div class="nb-actions"><span class="nb-wc" style="color:${wc>=3?"#E8572A":"#E8A020"}">✗ ${wc}回</span><button class="nb-star ${isStar?"on":""}" onclick="toggleStar(${q.id})">${isStar?"★":"☆"}</button><button class="nb-resolve" onclick="clearWrong(${q.id})">解決</button></div></div><p class="nb-q">${q.question}</p><div class="nb-ans-box"><span class="nb-ans-lbl">正解</span><span class="nb-ans-val">${alpha[q.answer]}. ${q.choices[q.answer]}</span></div><details class="nb-details"><summary class="nb-summary">解説を見る ▾</summary><p class="nb-exp">${q.explanation}</p></details></div>`;}).join("");return`<div class="page fadeUp"><div class="nb-nav"><button class="nav-back" onclick="S.screen='home';render()">${svgBack()}</button><h2 class="nb-title">間違いノート</h2><span class="nb-count">${weakQs.length}問</span></div>${weakQs.length===0?`<div class="empty-wrap"><div class="empty-icon">🎉</div><p class="empty-msg">まだ間違えた問題はありません</p><p class="empty-sub">どんどん問題に挑戦しよう！</p></div>`:`<div class="nb-list">${cards}</div>`}</div>`;}
render();
</script>
</body>
